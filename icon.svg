<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- teal 圓角底 -->
  <rect width="100" height="100" rx="22" fill="#0d9488"/>
  <!-- 相機機身 -->
  <rect x="14" y="34" width="72" height="46" rx="8" fill="white"/>
  <!-- 鏡頭外環 -->
  <circle cx="50" cy="57" r="16" fill="#0d9488"/>
  <!-- 鏡頭內環 -->
  <circle cx="50" cy="57" r="10" fill="white" opacity="0.25"/>
