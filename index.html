function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement('img');
      img.onload = () => {
        const scale = Math.min(1, MAX_IMG_WIDTH / img.width);
        const w = Math.round(img.width * scale);
        const hh = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = hh;
        canvas.getContext('2d').drawImage(img, 0, 0, w, hh);
        resolve(canvas.toDataURL('image/jpeg', JPG_QUALITY));
      };
      img.onerror = () => reject(new Error('圖片解析失敗'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function estimateNoteSize(note) {
  let bytes = (note.title?.length || 0) + (note.body?.length || 0);
  for (const im of (note.images || [])) {
    bytes += (im.dataUrl?.length || 0);
    bytes += JSON.stringify(im.strokes || []).length;
  }
  return bytes;
}

function Login() {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [isSignup, setIsSignup] = useState(false);
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const google = async () => {
    setErr(''); setLoading(true);
    try {
      await signInWithPopup(auth, googleProvider);
    } catch (e) {
      if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request' || e.code === 'auth/operation-not-supported-in-this-environment') {
        try { await signInWithRedirect(auth, googleProvider); return; }
        catch (e2) { setErr('登入失敗：' + e2.message); }
      } else setErr('登入失敗：' + e.message);
      setLoading(false);
    }
  };

  const emailLogin = async (e) => {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      if (isSignup) await createUserWithEmailAndPassword(auth, email, pwd);
      else await signInWithEmailAndPassword(auth, email, pwd);
    } catch (e) {
      let msg = e.message;
      if (e.code === 'auth/network-request-failed') msg = '帳號不存在或密碼錯誤。若是首次使用請點下方建立新帳號。';
      setErr(msg);
    } finally { setLoading(false); }

  const L = {

    card: { background: '#fff', padding: '40px 32px', borderRadius: 14, boxShadow: '0 4px 20px rgba(0,0,0,.06)', width: '100%', maxWidth: 380 },

  return h('div', { style: L.wrap },
    h('div', { style: L.card },
      h('h1', { style: L.title }, '照片筆記'),
      h('p', { style: L.sub }, '登入後可在電腦和手機間同步'),

      h('button', { onClick: () => setIsSignup(!isSignup), style: L.linkBtn }, isSignup ? '已有帳號？登入' : '沒有帳號？建立新帳號'),

function TextModal({ title, subtitle, placeholder, initial, confirmText, onConfirm, onCancel, multiline }) {
  const [val, setVal] = useState(initial || '');
  const [loading, setLoading] = useState(false);
  const [isComposing, setIsComposing] = useState(false);

  const submit = async () => {
    if (!val.trim() || loading) return;
    setLoading(true);
    try {
      await onConfirm(val.trim());
    } catch (err) {
      setLoading(false);
    }
  };

  return h('div', { style: S.modalOverlay, onClick: (e) => e.target === e.currentTarget && onCancel() },
    h('div', { style: S.modalCard },
      h('h3', { style: S.modalTitle }, title),
      subtitle && h('p', { style: S.modalSub }, subtitle),
      multiline
        ? h('textarea', { autoFocus: true, value: val, onChange: e => setVal(e.target.value), placeholder, style: { ...S.modalInput, minHeight: 80, resize: 'vertical' }, disabled: loading })
        : h('input', { autoFocus: true, value: val, onChange: e => setVal(e.target.value),
            onCompositionStart: () => setIsComposing(true),
            onCompositionEnd: () => setIsComposing(false),
            onKeyDown: e => { 
              if (e.key === 'Enter' && !isComposing) submit(); 
              if (e.key === 'Escape') onCancel(); 
            },
            placeholder, style: S.modalInput, disabled: loading }),
      h('div', { style: S.modalActions },
        h('button', { onClick: onCancel, disabled: loading, style: S.ghostBtn }, '取消'),
        h('button', { onClick: submit, disabled: !val.trim() || loading, style: { ...S.primaryBtn, opacity: val.trim() ? 1 : 0.5 } }, loading ? '處理中…' : (confirmText || '確定'))
      )
    )
  );
}

function PhotoAnnotator({ src, initialStrokes, initialGrayscale, onSave, onClose }) {
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const [tool, setTool] = useState("pen");
  const [color, setColor] = useState("#ef4444");
  const [width, setWidth] = useState(4);
  const [strokes, setStrokes] = useState((initialStrokes || []).filter(Boolean));
  const [grayscale, setGrayscale] = useState(!!initialGrayscale);
  const [drawing, setDrawing] = useState(false);
  const cur = useRef(null);
  const [textInput, setTextInput] = useState(null);
  const [imgDims, setImgDims] = useState({ w: 0, h: 0 });

  useEffect(() => {
    const img = document.createElement("img");
    img.onload = () => {
      const maxW = 1400;
      const scale = Math.min(1, maxW / img.width);
      setImgDims({ w: img.width * scale, h: img.height * scale });
      imgRef.current = img;
    };
    img.src = src;
  }, [src]);

  const drawStroke = (ctx, s) => {
    if (!s || !s.color) return;
    ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
    ctx.lineWidth = s.width; ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (s.type === "pen") {
      ctx.beginPath();
      s.points.forEach((p, i) => (i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)));
      ctx.stroke();
    } else if (s.type === "rect") {
      ctx.strokeRect(s.x0, s.y0, s.x1 - s.x0, s.y1 - s.y0);
    } else if (s.type === "arrow") {
      const head = 10 + s.width * 2;
      const ang = Math.atan2(s.y1 - s.y0, s.x1 - s.x0);
      ctx.beginPath(); ctx.moveTo(s.x0, s.y0); ctx.lineTo(s.x1, s.y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x1 - head * Math.cos(ang - Math.PI / 6), s.y1 - head * Math.sin(ang - Math.PI / 6));
      ctx.lineTo(s.x1 - head * Math.cos(ang + Math.PI / 6), s.y1 - head * Math.sin(ang + Math.PI / 6));
      ctx.closePath(); ctx.fill();
    } else if (s.type === "text") {
      ctx.font = `${s.size}px -apple-system, "PingFang TC", sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillText(s.text, s.x, s.y);
    }
  };

  const redraw = useCallback(() => {
    const c = canvasRef.current;
    if (!c || !imgRef.current) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    if (grayscale) ctx.filter = 'grayscale(100%)';
    ctx.drawImage(imgRef.current, 0, 0, c.width, c.height);
    ctx.filter = 'none';
    const all = cur.current ? [...strokes, cur.current] : strokes;
    for (const s of all) drawStroke(ctx, s);
  }, [strokes, grayscale]);

  useEffect(() => { redraw(); }, [redraw, imgDims]);

  const pos = (e) => {
    const r = canvasRef.current.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - r.left) * (canvasRef.current.width / r.width),
      y: (t.clientY - r.top) * (canvasRef.current.height / r.height),
    };
  };

  const nearStroke = (s, p) => {
    if (!s) return false;
    const d = 12;
    if (s.type === "pen") return s.points.some((pt) => Math.hypot(pt.x - p.x, pt.y - p.y) < d);
    if (s.type === "text") return Math.abs(p.x - s.x) < 120 && Math.abs(p.y - s.y) < s.size + 6;
    const minX = Math.min(s.x0, s.x1) - d, maxX = Math.max(s.x0, s.x1) + d;
    const minY = Math.min(s.y0, s.y1) - d, maxY = Math.max(s.y0, s.y1) + d;
    return p.x > minX && p.x < maxX && p.y > minY && p.y < maxY;
  };

  const eraseAt = (p) => {
    setStrokes((curr) => {
      const hit = [...curr].reverse().find((s) => nearStroke(s, p));
      return hit ? curr.filter((s) => s.id !== hit.id) : curr;
    });
  };

  const start = (e) => {
    e.preventDefault();
    const p = pos(e);
    if (tool === "text") { setTextInput({ x: p.x, y: p.y, value: "" }); return; }
    if (tool === "erase") { setDrawing(true); eraseAt(p); return; }
    setDrawing(true);
    if (tool === "pen") cur.current = { id: uid(), type: "pen", color, width, points: [p] };
    else cur.current = { id: uid(), type: tool, color, width, x0: p.x, y0: p.y, x1: p.x, y1: p.y };
  };

  const move = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const p = pos(e);
    if (tool === "erase") { eraseAt(p); return; }
    if (tool === "pen") cur.current.points.push(p);
    else { cur.current.x1 = p.x; cur.current.y1 = p.y; }
    redraw();
  };

  const end = () => {
    if (!drawing) return;
    setDrawing(false);
    if (tool === "erase") return;
    const finished = cur.current;
    cur.current = null;
    if (finished) setStrokes((s) => [...s, finished]);
  };

  const commitText = () => {
    if (textInput && textInput.value.trim()) {
      setStrokes((s) => [...s, {
        id: uid(), type: "text", color, text: textInput.value,
        x: textInput.x, y: textInput.y, size: Math.max(18, width * 6),
      }]);
    }
    setTextInput(null);
  };

  const undo = () => setStrokes((s) => s.slice(0, -1));
  const save = () => { cur.current = null; onSave({ strokes, grayscale }); };

  const tools = [
    { id: "pen", icon: "✏️", label: "畫筆" },
    { id: "arrow", icon: "↗", label: "箭頭" },
    { id: "rect", icon: "▢", label: "方框" },
    { id: "text", icon: "T", label: "文字" },
    { id: "erase", icon: "🧽", label: "橡皮擦" },
  ];

  return h('div', { style: S.modalOverlay },
    h('div', { style: S.annotatorBox },
      h('div', { style: S.annotatorBar },
        h('div', { style: { display: "flex", gap: 6 } },
          ...tools.map((t) =>
            h('button', { key: t.id, onClick: () => setTool(t.id), title: t.label,
              style: { ...S.toolBtn, ...(tool === t.id ? S.toolBtnActive : {}) } }, t.icon)),
          h('button', { onClick: undo, title: "復原", style: S.toolBtn }, '⟲'),
          h('button', { onClick: () => setGrayscale(g => !g), title: "黑白底圖",
            style: { ...S.toolBtn, ...(grayscale ? S.toolBtnActive : {}) } }, '◐')
        ),
        h('div', { style: { display: "flex", alignItems: "center", gap: 10 } },
          h('div', { style: { display: "flex", gap: 5 } },
            ...COLORS.map((c) =>
              h('button', { key: c, onClick: () => setColor(c),
                style: { ...S.swatch, background: c, outline: color === c ? "2px solid #fff" : "1px solid #475569", outlineOffset: 2 } }))),
          h('input', { type: "range", min: 2, max: 14, value: width,
            onChange: (e) => setWidth(+e.target.value), style: { width: 80 } })
        ),
        h('div', { style: { display: "flex", gap: 8 } },
          h('button', { onClick: onClose, style: S.ghostBtn }, '取消'),
          h('button', { onClick: save, style: S.primaryBtn }, '✓ 完成'))
      ),
      h('div', { style: S.canvasWrap },
        h('div', { style: { position: "relative", width: imgDims.w, maxWidth: "100%" } },
          h('canvas', {
            ref: canvasRef, width: imgDims.w, height: imgDims.h,
            style: { width: "100%", display: "block", borderRadius: 8, touchAction: "none", cursor: tool === "text" ? "text" : "crosshair" },
            onMouseDown: start, onMouseMove: move, onMouseUp: end, onMouseLeave: end,
            onTouchStart: start, onTouchMove: move, onTouchEnd: end
          }),
          textInput && h('input', {
            autoFocus: true, value: textInput.value,
            onChange: (e) => setTextInput({ ...textInput, value: e.target.value }),
            onBlur: commitText, onKeyDown: (e) => e.key === "Enter" && commitText(),
            placeholder: "輸入文字後按 Enter",
            style: {
              position: "absolute",
              left: `${(textInput.x / imgDims.w) * 100}%`,
              top: `${(textInput.y / imgDims.h) * 100}%`,
              color, fontSize: 16, border: `2px solid ${color}`,
              borderRadius: 4, padding: "2px 6px", background: "rgba(255,255,255,.95)", outline: "none",
            }
          })
        )
      )
    )
  );
}

// ─────────────────────────────────────────────────────────────
// 縮圖
// ─────────────────────────────────────────────────────────────
function ImageCard({ image, index, onAnnotate, onDelete, confirmingDelete, onConfirmDelete }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const img = document.createElement('img');
    img.onload = () => {
      const c = canvasRef.current; if (!c) return;
      const maxW = 400; const scale = Math.min(1, maxW / img.width);
      c.width = img.width * scale; c.height = img.height * scale;
      const ctx = c.getContext('2d');
      if (image.grayscale) ctx.filter = 'grayscale(100%)';
      ctx.drawImage(img, 0, 0, c.width, c.height);
      ctx.filter = 'none';
      const annotatorScale = Math.min(1, 1400 / img.width);
      const ratio = c.width / (img.width * annotatorScale);
      for (const s of (image.strokes || [])) {
        if (!s || !s.color) continue;
        ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
        ctx.lineWidth = s.width * ratio; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (s.type === 'pen') {
          ctx.beginPath();
          s.points.forEach((p, i) => (i ? ctx.lineTo(p.x * ratio, p.y * ratio) : ctx.moveTo(p.x * ratio, p.y * ratio)));
          ctx.stroke();
        } else if (s.type === 'rect') {
          ctx.strokeRect(s.x0 * ratio, s.y0 * ratio, (s.x1 - s.x0) * ratio, (s.y1 - s.y0) * ratio);
        } else if (s.type === 'arrow') {
          const x0 = s.x0 * ratio, y0 = s.y0 * ratio, x1 = s.x1 * ratio, y1 = s.y1 * ratio;
          const head = (10 + s.width * 2) * ratio;
          const ang = Math.atan2(y1 - y0, x1 - x0);
          ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x1, y1);
          ctx.lineTo(x1 - head * Math.cos(ang - Math.PI / 6), y1 - head * Math.sin(ang - Math.PI / 6));
          ctx.lineTo(x1 - head * Math.cos(ang + Math.PI / 6), y1 - head * Math.sin(ang + Math.PI / 6));
          ctx.closePath(); ctx.fill();
        } else if (s.type === 'text') {
          ctx.font = `${s.size * ratio}px -apple-system, "PingFang TC", sans-serif`;
          ctx.textBaseline = 'top';
          ctx.fillText(s.text, s.x * ratio, s.y * ratio);
        }
      }
    };
    img.src = image.dataUrl;
  }, [image.dataUrl, image.strokes, image.grayscale]);

  return h('div', { style: S.imgCard },
    h('canvas', { ref: canvasRef, style: S.thumb, onClick: onAnnotate }),
    h('div', { style: S.imgActions },
      h('button', { onClick: onAnnotate, style: S.imgActBtn }, '🎨 標註'),
      h('a', { href: image.dataUrl, download: `note-${index + 1}.jpg`, style: S.imgActBtn }, '⬇'),
      confirmingDelete
        ? h('button', { onClick: onConfirmDelete, style: { ...S.imgActBtn, color: "#ef4444", borderColor: "#fecaca" } }, '確定')
        : h('button', { onClick: onDelete, style: { ...S.imgActBtn, color: "#ef4444" } }, '🗑')
    )
  );
}

// ─────────────────────────────────────────────────────────────
// 專案項目（含改名）

function ProjectItem({ project, isActive, onClick, onRename, onDelete, confirmingDelete, onConfirmDelete, onCancelDelete }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(project.name);

  if (editing) {
    const submit = () => {
      const trimmed = val.trim();
      if (trimmed && trimmed !== project.name) onRename(trimmed);
      setEditing(false);
    };
    return h('div', { style: { ...S.projItem, ...(isActive ? S.projItemActive : {}) } },
      h('span', null, '📁'),
      h('input', {
        autoFocus: true, value: val,
        onChange: (e) => setVal(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') { setVal(project.name); setEditing(false); } },
        onBlur: submit,
        style: { flex: 1, border: '1px solid #0d9488', borderRadius: 4, padding: '2px 6px', fontSize: 13, outline: 'none' }
      })
    );
  }

  return h('div', { onClick, style: { ...S.projItem, ...(isActive ? S.projItemActive : {}) } },
    h('span', null, '📁'),
    h('span', { style: { flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, project.name),
    confirmingDelete
      ? h('span', { style: { display: "flex", gap: 8 } },
          h('span', { style: { color: '#ef4444', cursor: 'pointer' }, onClick: (e) => { e.stopPropagation(); onConfirmDelete(); } }, '✓'),
          h('span', { style: { color: '#9ca3af', cursor: 'pointer' }, onClick: (e) => { e.stopPropagation(); onCancelDelete(); } }, '✕'))
      : h('span', { style: { display: 'flex', gap: 6 } },
          h('span', { onClick: (e) => { e.stopPropagation(); setEditing(true); setVal(project.name); },
            style: { color: '#cbd5e1', cursor: 'pointer', fontSize: 13 }, title: '改名' }, '✏️'),
          h('span', { onClick: (e) => { e.stopPropagation(); onDelete(); },
            style: { color: '#cbd5e1', cursor: 'pointer' }, title: '刪除' }, '🗑'))
  );
}

// ─────────────────────────────────────────────────────────────
// 主應用
// ─────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [projects, setProjects] = useState([]);
  const [notes, setNotes] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [allDeletedNotes, setAllDeletedNotes] = useState([]);
  const [allDeletedTasks, setAllDeletedTasks] = useState([]);
  const [activeProject, setActiveProject] = useState(null);
  const [activeNote, setActiveNote] = useState(null);
  const [annotating, setAnnotating] = useState(null);
  const [search, setSearch] = useState("");
  const [creatingProj, setCreatingProj] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [tab, setTab] = useState('notes');
  const [showTrash, setShowTrash] = useState(false);
  const [newTaskModal, setNewTaskModal] = useState(false);
  const [completeTaskId, setCompleteTaskId] = useState(null);
  const [permDelConfirm, setPermDelConfirm] = useState(null);
  const fileRef = useRef(null);
  const saveTimer = useRef(null);
  const lastLocalEdit = useRef(0);

  useEffect(() => {
    getRedirectResult(auth).catch(e => console.error("登入回傳:", e));
    const unsub = onAuthStateChanged(auth, (u) => { setUser(u); setAuthReady(true); });
    return unsub;
  }, []);

  useEffect(() => {
    if (!user) { setProjects([]); return; }
    const q = query(collection(db, `users/${user.uid}/projects`), orderBy("created", "desc"));
    return onSnapshot(q, (snap) => setProjects(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, [user]);

  useEffect(() => {
    if (!user || !activeProject) { setNotes([]); return; }
    const q = query(
      collection(db, `users/${user.uid}/notes`),
      where("projectId", "==", activeProject.id),
      orderBy("updated", "desc")
    );
    return onSnapshot(q, (snap) => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setNotes(list);
      if (activeNote && Date.now() - lastLocalEdit.current > 1500) {
        const fresh = list.find(n => n.id === activeNote.id);
        if (fresh) setActiveNote(fresh);
      }
    });
  }, [user, activeProject]);

  useEffect(() => {
    if (!user || !activeProject) { setTasks([]); return; }
    const q = query(
      collection(db, `users/${user.uid}/tasks`),
      where("projectId", "==", activeProject.id),
      orderBy("created", "desc")
    );
    return onSnapshot(q, (snap) => setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, [user, activeProject]);

  useEffect(() => {
    if (!user || !showTrash) { setAllDeletedNotes([]); setAllDeletedTasks([]); return; }
    const unsubN = onSnapshot(collection(db, `users/${user.uid}/notes`), (snap) => {
      setAllDeletedNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(n => n.deleted));
    });
    const unsubT = onSnapshot(collection(db, `users/${user.uid}/tasks`), (snap) => {
      setAllDeletedTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(t => t.deleted));
    });
    return () => { unsubN(); unsubT(); };
  }, [user, showTrash]);

  // Projects
  const createProject = async (name) => {
    try {
      const docRef = await addDoc(collection(db, `users/${user.uid}/projects`), { name, created: serverTimestamp(), deleted: false });
      setCreatingProj(false);
      setActiveProject({ id: docRef.id, name });
      setActiveNote(null);
    } catch (err) {
      console.error(err);
      alert("新增專案失敗：" + err.message + " (請檢查 Firebase 資料庫權限)");
    }
  };
  const renameProject = async (id, name) => {
    await updateDoc(doc(db, `users/${user.uid}/projects/${id}`), { name });
    if (activeProject?.id === id) setActiveProject({ ...activeProject, name });
  };
  const trashProject = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/projects/${id}`), { deleted: true, deletedAt: serverTimestamp() });
    if (activeProject?.id === id) { setActiveProject(null); setActiveNote(null); }
    setConfirmDel(null);
  };
  const restoreProject = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/projects/${id}`), { deleted: false, deletedAt: null });
  };
  const permDelProject = async (id) => {
    const batch = writeBatch(db);
    const ns = await getDocs(query(collection(db, `users/${user.uid}/notes`), where("projectId", "==", id)));
    ns.docs.forEach(d => batch.delete(d.ref));
    const ts = await getDocs(query(collection(db, `users/${user.uid}/tasks`), where("projectId", "==", id)));
    ts.docs.forEach(d => batch.delete(d.ref));
    batch.delete(doc(db, `users/${user.uid}/projects/${id}`));
    await batch.commit();
    setPermDelConfirm(null);
  };

  // Notes
  const addNote = async () => {
    try {
      const docRef = await addDoc(collection(db, `users/${user.uid}/notes`), {
        projectId: activeProject.id, title: "", body: "", images: [], deleted: false,
        created: serverTimestamp(), updated: serverTimestamp(),
      });
      setActiveNote({ id: docRef.id, projectId: activeProject.id, title: "", body: "", images: [] });
    } catch (err) {
      console.error(err);
      alert("新增筆記失敗：" + err.message + " (請檢查 Firebase 資料庫權限)");
    }
  };
  
  // 已經移除自動儲存機制，改為純粹更新畫面狀態
  const updateNoteFields = (patch) => {
    lastLocalEdit.current = Date.now();
    setActiveNote(cur => ({ ...cur, ...patch }));
  };

  // 手動儲存筆記函式
  const manualSaveNote = async () => {
    if (!activeNote?.id) return;
    try {
      await updateDoc(doc(db, `users/${user.uid}/notes/${activeNote.id}`), {
        title: activeNote.title,
        body: activeNote.body,
        updated: serverTimestamp()
      });
      alert('💾 筆記儲存成功！');
    } catch (err) {
      alert('儲存失敗：' + err.message);
    }
  };

  const updateNoteNow = async (patch) => {
    lastLocalEdit.current = Date.now();
    setActiveNote(cur => ({ ...cur, ...patch }));
    try {
      await updateDoc(doc(db, `users/${user.uid}/notes/${activeNote.id}`), { ...patch, updated: serverTimestamp() });
    } catch (err) {
      if (err.message.includes('exceeds')) alert("筆記太大了（超過 1MB）。請刪除幾張照片或新建一個筆記。");
      else alert("儲存失敗：" + err.message);
      throw err;
    }
  };
  const trashNote = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/notes/${id}`), { deleted: true, deletedAt: serverTimestamp() });
    if (activeNote?.id === id) setActiveNote(null);
    setConfirmDel(null);
  };
  const restoreNote = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/notes/${id}`), { deleted: false, deletedAt: null });
  };
  const permDelNote = async (id) => {
    await deleteDoc(doc(db, `users/${user.uid}/notes/${id}`));
    setPermDelConfirm(null);
  };
  const onPickImage = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length || !activeNote) return;
    setUploading(true);
    try {
      const newImages = [...(activeNote.images || [])];
      for (const f of files) {
        const dataUrl = await compressImage(f);
        newImages.push({ id: uid(), dataUrl, strokes: [], grayscale: false });
      }
      const fakeNote = { ...activeNote, images: newImages };
      if (estimateNoteSize(fakeNote) > 950000) {
        alert("加入這些照片後筆記會超過 1MB 上限。請刪除舊照片或新建一個筆記再加。");
        return;
      }
      await updateNoteNow({ images: newImages });
    } catch (err) { /* alert 已處理 */ }
    finally { setUploading(false); }
  };
  const saveAnnotation = async ({ strokes, grayscale }) => {
    const imgs = activeNote.images.map((im, i) => i === annotating.imgIndex ? { ...im, strokes, grayscale } : im);
    await updateNoteNow({ images: imgs });
    setAnnotating(null);
  };
  const delImage = async (i) => {
    await updateNoteNow({ images: activeNote.images.filter((_, idx) => idx !== i) });
    setConfirmDel(null);
  };

  // Tasks
  const addTask = async (title) => {
    try {
      const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("連線逾時")), 5000));
      const addPromise = addDoc(collection(db, `users/${user.uid}/tasks`), {
        projectId: activeProject.id, title, done: false, deleted: false,
        created: serverTimestamp(),
      });
      await Promise.race([addPromise, timeout]);
      setNewTaskModal(false);
    } catch (err) {
      console.error(err);
      if (err.message === "連線逾時") {
        alert("新增失敗：連線逾時！\n\n👉 請檢查您是否已在 Firebase 控制台點擊「建立資料庫 (Create Database)」，或確認安全規則已發布。");
      } else {
        alert("新增任務失敗：" + err.message);
      }
      throw err;

  const completeTask = async (reason) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${completeTaskId}`), {
      done: true, doneReason: reason, doneAt: serverTimestamp()
    });
    setCompleteTaskId(null);
  };
  const uncompleteTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), {
      done: false, doneReason: null, doneAt: null
    });
  };
  const trashTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { deleted: true, deletedAt: serverTimestamp() });
    setConfirmDel(null);
  };
  const restoreTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { deleted: false, deletedAt: null });
  };
  const permDelTask = async (id) => {
    await deleteDoc(doc(db, `users/${user.uid}/tasks/${id}`));
    setPermDelConfirm(null);
  };

  if (!user) return h(Login);

  const activeProjects = projects.filter(p => !p.deleted);
  const deletedProjects = projects.filter(p => p.deleted);
  const visibleNotes = notes.filter(n => !n.deleted);
  const visibleTasks = tasks.filter(t => !t.deleted);
  const filtered = visibleNotes.filter((n) => !search || (n.title || '').includes(search) || (n.body || '').includes(search));

    noteSize = estimateNoteSize(activeNote);
    sizePct = Math.min(100, Math.round(noteSize / 10000));

    h('div', { style: S.brand }, '📷 照片筆記'),

      : h('button', { onClick: () => setCreatingProj(true), style: S.newProjBtn }, '+ 新增專案')),
    h('div', { style: { overflowY: "auto", flex: 1, marginTop: 4 } },

        h(ProjectItem, {
          key: p.id, project: p, isActive: activeProject?.id === p.id,
          onClick: () => { setActiveProject(p); setActiveNote(null); setSearch(""); setTab('notes'); },
          onRename: (name) => renameProject(p.id, name),
          onDelete: () => setConfirmDel({ type: "project", id: p.id }),
          confirmingDelete: confirmDel?.type === "project" && confirmDel.id === p.id,
          onConfirmDelete: () => trashProject(p.id),
          onCancelDelete: () => setConfirmDel(null),
        }))
    ),
    h('button', {
      onClick: () => { setShowTrash(t => !t); setActiveProject(null); setActiveNote(null); },
      style: { ...S.trashBtn, ...(showTrash ? S.trashBtnActive : {}) }
    }, '🗑️ 垃圾桶'),
    h('div', { style: S.userBar },
      h('div', { style: S.userInfo },
        user.photoURL && h('img', { src: user.photoURL, alt: '', style: S.avatar, referrerPolicy: 'no-referrer' }),
        h('span', { style: S.userName }, user.displayName || user.email)),
      h('button', { onClick: () => signOut(auth), style: { ...S.miniBtn, background: '#f1f5f9', color: '#64748b', width: 30, height: 30 }, title: '登出' }, '⎋'))
  );

  if (showTrash) {
    const trashEmpty = deletedProjects.length === 0 && allDeletedNotes.length === 0 && allDeletedTasks.length === 0;
    return h('div', { style: S.app },
      sidebar,
      h('main', { style: { ...S.editorCol, padding: 24, overflowY: 'auto' } },
        h('h2', { style: { marginTop: 0 } }, '🗑️ 垃圾桶'),
        h('p', { style: { color: '#64748b', fontSize: 13 } }, '在這裡可以還原刪除的項目，或永久刪除釋放空間。'),
        trashEmpty && h('div', { style: { ...S.placeholder, height: 200 } }, '垃圾桶是空的'),
        deletedProjects.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除專案 (${deletedProjects.length})`),
          ...deletedProjects.map(p => h('div', { key: p.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `📁 ${p.name}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(p.deletedAt)}　會連同其中所有筆記與任務一併處理`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreProject(p.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'project' && permDelConfirm.id === p.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelProject(p.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'project', id: p.id }), style: S.miniDanger }, '永久刪除'))
          ))
        ),
        allDeletedNotes.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除筆記 (${allDeletedNotes.length})`),
          ...allDeletedNotes.map(n => h('div', { key: n.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `📝 ${n.title || '未命名筆記'}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(n.deletedAt)}　${(n.images?.length || 0)} 張照片`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreNote(n.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'note' && permDelConfirm.id === n.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelNote(n.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'note', id: n.id }), style: S.miniDanger }, '永久刪除'))
          ))
        ),
        allDeletedTasks.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除任務 (${allDeletedTasks.length})`),
          ...allDeletedTasks.map(t => h('div', { key: t.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `${t.done ? '✓' : '○'} ${t.title}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(t.deletedAt)}`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreTask(t.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'task' && permDelConfirm.id === t.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelTask(t.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'task', id: t.id }), style: S.miniDanger }, '永久刪除'))
          ))
        )
      )
    );
  }

  return h('div', { style: S.app },
    sidebar,

    activeProject && h('section', { style: S.listCol },
      h('div', { style: S.listHead },
        h('strong', { style: { fontSize: 15 } }, activeProject.name),
        tab === 'notes'
          ? h('button', { onClick: addNote, style: S.primaryBtnSm }, '+ 新筆記')
          : h('button', { onClick: () => setNewTaskModal(true), style: S.primaryBtnSm }, '+ 新任務')
      ),
      h('div', { style: S.tabBar },
        h('div', { onClick: () => setTab('notes'), style: { ...S.tab, ...(tab === 'notes' ? S.tabActive : {}) } }, `筆記 (${visibleNotes.length})`),
        h('div', { onClick: () => setTab('tasks'), style: { ...S.tab, ...(tab === 'tasks' ? S.tabActive : {}) } },
          `任務 (${visibleTasks.filter(t => !t.done).length}/${visibleTasks.length})`)
      ),
      tab === 'notes' && h('div', { style: S.searchBox },
        h('span', null, '🔍'),
        h('input', { value: search, onChange: (e) => setSearch(e.target.value), placeholder: '搜尋筆記…', style: S.searchInput })
      ),
      h('div', { style: { overflowY: "auto", flex: 1 } },
        tab === 'notes' && h('div', null,
          filtered.length === 0 && h('div', { style: S.empty }, search ? '找不到符合的筆記' : '點「新筆記」開始'),
          ...filtered.map((n) =>
            h('div', { key: n.id, onClick: () => setActiveNote(n),
              style: { ...S.noteItem, ...(activeNote?.id === n.id ? S.noteItemActive : {}) } },
              h('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
                h('span', { style: { fontWeight: 600, fontSize: 14, color: "#1f2937" } }, n.title || '未命名筆記'),
                (n.images?.length > 0) && h('span', { style: S.imgBadge }, `📷 ${n.images.length}`)),
              h('div', { style: S.notePreview }, n.body || '（無內容）'),
              h('div', { style: S.noteDate }, fmt(n.updated))
            ))
        ),
        tab === 'tasks' && h('div', null,
          visibleTasks.length === 0 && h('div', { style: S.empty }, '點「新任務」開始'),
          ...visibleTasks.map(t =>
            h('div', { key: t.id, style: S.taskItem },
              h('div', {
                onClick: () => { if (t.done) uncompleteTask(t.id); else setCompleteTaskId(t.id); },
                style: { ...S.taskCheck, ...(t.done ? S.taskCheckDone : {}) }
              }, t.done ? '✓' : ''),
              h('div', { style: { flex: 1 } },
                h('div', { style: { ...S.taskTitle, ...(t.done ? S.taskTitleDone : {}) } }, t.title),
                t.done && t.doneReason && h('div', { style: S.taskReason }, `✓ ${t.doneReason}`),
                h('div', { style: S.taskMeta },
                  t.done ? `完成於 ${fmt(t.doneAt)}` : `建立於 ${fmt(t.created)}`)),
              confirmDel?.type === 'task' && confirmDel.id === t.id
                ? h('span', { style: { display: "flex", gap: 4 } },
                    h('span', { style: { color: '#ef4444', cursor: 'pointer' }, onClick: () => trashTask(t.id) }, '✓'),
                    h('span', { style: { color: '#9ca3af', cursor: 'pointer' }, onClick: () => setConfirmDel(null) }, '✕'))
                : h('span', { style: { color: '#cbd5e1', cursor: 'pointer', alignSelf: 'flex-start' }, onClick: () => setConfirmDel({ type: 'task', id: t.id }) }, '🗑')
            ))
        )
      )
    ),

    h('main', { style: S.editorCol },
      !activeProject
        ? h('div', { style: S.placeholder }, h('div', { style: { fontSize: 48 } }, '📁'), h('p', null, '選擇或新增一個專案開始記錄'))
        : tab === 'tasks'
        ? h('div', { style: S.placeholder },
            h('div', { style: { fontSize: 48 } }, '✓'),
            h('p', null, '從左側選任務的勾選框完成它'),
            h('p', { style: { fontSize: 12, color: '#cbd5e1', marginTop: -8 } }, '勾選後會問你完成的理由'))
        : !activeNote
        ? h('div', { style: S.placeholder }, h('div', { style: { fontSize: 48 } }, '📝'), h('p', null, '選擇左側筆記，或建立新筆記'))
        : h('div', { style: S.editor },
            h('div', { style: S.editorTop },
              h('input', { value: activeNote.title || '', onChange: (e) => updateNoteFields({ title: e.target.value }), placeholder: '筆記標題', style: S.titleInput }),
              h('div', { style: { display: "flex", gap: 8 } },
                h('button', { onClick: manualSaveNote, style: { ...S.primaryBtnSm, background: '#3b82f6' } }, '💾 儲存'),
                h('button', { onClick: () => fileRef.current.click(), disabled: uploading, style: S.ghostBtn }, uploading ? '處理中…' : '📷 加照片'),
                confirmDel?.type === "note" && confirmDel.id === activeNote.id
                  ? h('span', { style: { display: 'flex', gap: 8 } },
                      h('button', { onClick: () => trashNote(activeNote.id), style: S.dangerBtn }, '確定刪除'),
                      h('button', { onClick: () => setConfirmDel(null), style: S.ghostBtn }, '✕'))
                  : h('button', { onClick: () => setConfirmDel({ type: "note", id: activeNote.id }), style: S.dangerBtn }, '🗑')
              ),
              h('input', { ref: fileRef, type: 'file', accept: 'image/*', multiple: true, capture: 'environment', onChange: onPickImage, style: { display: 'none' } })
            ),
            h('div', { style: S.editorDate },
              h('span', null, '最後編輯 ' + fmt(activeNote.updated)),
              h('span', { style: { ...S.sizeBar, ...(sizePct > 85 ? S.sizeBarFull : {}) } },
                `${(noteSize / 1024).toFixed(0)} KB / 1 MB (${sizePct}%)`)
            ),
            h('textarea', { value: activeNote.body || '',
              onChange: (e) => updateNoteFields({ body: e.target.value }),
              placeholder: '在這裡寫工作記事…　拍照或匯入照片後，點照片即可在上面畫圖、標註。',
              style: S.bodyArea }),
            (activeNote.images?.length > 0) && h('div', { style: S.imgGrid },
              ...activeNote.images.map((im, i) =>
                h(ImageCard, { key: im.id, image: im, index: i,
                  onAnnotate: () => setAnnotating({ noteId: activeNote.id, imgIndex: i }),
                  onDelete: () => setConfirmDel({ type: "image", id: i }),
                  confirmingDelete: confirmDel?.type === "image" && confirmDel.id === i,
                  onConfirmDelete: () => delImage(i)
                })))
          )
    ),

    annotating && h(PhotoAnnotator, {
      src: activeNote.images[annotating.imgIndex].dataUrl,
      initialStrokes: activeNote.images[annotating.imgIndex].strokes || [],
      initialGrayscale: !!activeNote.images[annotating.imgIndex].grayscale,
      onSave: saveAnnotation, onClose: () => setAnnotating(null)
    }),
    newTaskModal && h(TextModal, {
      title: '新增任務', placeholder: '要做什麼？例如：寄出申請書',
      confirmText: '建立', onConfirm: addTask, onCancel: () => setNewTaskModal(false)
    }),
    completeTaskId && h(TextModal, {
      title: '完成任務', subtitle: '記錄一下完成的方式或結果，之後可以回顧。',
      placeholder: '例如：已親送至客戶辦公室、編號 A-23',
      multiline: true, confirmText: '完成',
      onConfirm: completeTask, onCancel: () => setCompleteTaskId(null)
    })
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
