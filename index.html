function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement('img');
      img.onload = () => {
        const scale = Math.min(1, MAX_IMG_WIDTH / img.width);
        const w = Math.round(img.width * scale);
        const hh = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = hh;
        canvas.getContext('2d').drawImage(img, 0, 0, w, hh);
        resolve(canvas.toDataURL('image/jpeg', JPG_QUALITY));
      };
      img.onerror = () => reject(new Error('圖片解析失敗'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function rotateImageData(dataUrl, deg) {
  return new Promise((resolve, reject) => {
    const img = document.createElement('img');
    img.onload = () => {
      const swap = deg === 90 || deg === 270;
      const canvas = document.createElement('canvas');
      canvas.width = swap ? img.height : img.width;
      canvas.height = swap ? img.width : img.height;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate((deg * Math.PI) / 180);
      ctx.drawImage(img, -img.width / 2, -img.height / 2);
      resolve(canvas.toDataURL('image/jpeg', JPG_QUALITY));
    };
    img.onerror = () => reject(new Error('旋轉失敗'));
    img.src = dataUrl;
  });
}

function estimateNoteSize(note) {
  let bytes = (note.title?.length || 0) + (note.body?.length || 0);
  for (const im of (note.images || [])) {
    bytes += (im.dataUrl?.length || 0);
    bytes += JSON.stringify(im.strokes || []).length;
  }
  return bytes;
}

  const [err, setErr] = useState('');

  const google = async () => {
    setErr(''); setLoading(true);
    try {
      await signInWithPopup(auth, googleProvider);
    } catch (e) {
      if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request' || e.code === 'auth/operation-not-supported-in-this-environment') {
        try { await signInWithRedirect(auth, googleProvider); return; }
        catch (e2) { setErr('登入失敗：' + e2.message); }
      } else setErr('登入失敗：' + e.message);
      setLoading(false);
    }
  };

  const emailLogin = async (e) => {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      if (isSignup) await createUserWithEmailAndPassword(auth, email, pwd);
      else await signInWithEmailAndPassword(auth, email, pwd);
    } catch (e) {
      let msg = e.message;
      if (e.code === 'auth/network-request-failed') msg = '帳號不存在或密碼錯誤。若是首次使用請點下方建立新帳號。';

function TextModal({ title, subtitle, placeholder, initial, confirmText, onConfirm, onCancel, multiline }) {
  const [val, setVal] = useState(initial || '');
  const [loading, setLoading] = useState(false);
  const [isComposing, setIsComposing] = useState(false);

  const submit = async () => {
    if (!val.trim() || loading) return;
    setLoading(true);
    try {
      await onConfirm(val.trim());
    } catch (err) {
      setLoading(false);
    }
  };

  return h('div', { style: S.modalOverlay, onClick: (e) => e.target === e.currentTarget && onCancel() },
    h('div', { style: S.modalCard },
      h('h3', { style: S.modalTitle }, title),
      subtitle && h('p', { style: S.modalSub }, subtitle),
      multiline
        ? h('textarea', { autoFocus: true, value: val, onChange: e => setVal(e.target.value), placeholder, style: { ...S.modalInput, minHeight: 80, resize: 'vertical' }, disabled: loading })
        : h('input', { autoFocus: true, value: val, onChange: e => setVal(e.target.value),
            onCompositionStart: () => setIsComposing(true),
            onCompositionEnd: () => setIsComposing(false),
            onKeyDown: e => { 
              if (e.key === 'Enter' && !isComposing) submit(); 
              if (e.key === 'Escape') onCancel(); 
            },
            placeholder, style: S.modalInput, disabled: loading }),
      h('div', { style: S.modalActions },
        h('button', { onClick: onCancel, disabled: loading, style: S.ghostBtn }, '取消'),
        h('button', { onClick: submit, disabled: !val.trim() || loading, style: { ...S.primaryBtn, opacity: val.trim() ? 1 : 0.5 } }, loading ? '處理中…' : (confirmText || '確定'))
      )
    )
  );
}

function PhotoAnnotator({ src, initialStrokes, initialGrayscale, onSave, onClose }) {
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const [tool, setTool] = useState("pen");
  const [color, setColor] = useState("#ef4444");
  const [width, setWidth] = useState(4);
  const [strokes, setStrokes] = useState((initialStrokes || []).filter(Boolean));
  const [grayscale, setGrayscale] = useState(!!initialGrayscale);
  const [drawing, setDrawing] = useState(false);
  const cur = useRef(null);
  const [textInput, setTextInput] = useState(null);
  const [imgDims, setImgDims] = useState({ w: 0, h: 0 });

  useEffect(() => {
    const img = document.createElement("img");
    img.onload = () => {
      const maxW = 1400;
      const scale = Math.min(1, maxW / img.width);
      setImgDims({ w: img.width * scale, h: img.height * scale });
      imgRef.current = img;
    };
    img.src = src;
  }, [src]);

  const drawStroke = (ctx, s) => {
    if (!s || !s.color) return;
    ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
    ctx.lineWidth = s.width; ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (s.type === "pen") {
      ctx.beginPath();
      s.points.forEach((p, i) => (i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)));
      ctx.stroke();
    } else if (s.type === "rect") {
      ctx.strokeRect(s.x0, s.y0, s.x1 - s.x0, s.y1 - s.y0);
    } else if (s.type === "arrow") {
      const head = 10 + s.width * 2;
      const ang = Math.atan2(s.y1 - s.y0, s.x1 - s.x0);
      ctx.beginPath(); ctx.moveTo(s.x0, s.y0); ctx.lineTo(s.x1, s.y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x1 - head * Math.cos(ang - Math.PI / 6), s.y1 - head * Math.sin(ang - Math.PI / 6));
      ctx.lineTo(s.x1 - head * Math.cos(ang + Math.PI / 6), s.y1 - head * Math.sin(ang + Math.PI / 6));
      ctx.closePath(); ctx.fill();
    } else if (s.type === "text") {
      ctx.font = `${s.size}px -apple-system, "PingFang TC", sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillText(s.text, s.x, s.y);
    }
  };

  const redraw = useCallback(() => {
    const c = canvasRef.current;
    if (!c || !imgRef.current) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    if (grayscale) ctx.filter = 'grayscale(100%)';
    ctx.drawImage(imgRef.current, 0, 0, c.width, c.height);
    ctx.filter = 'none';
    const all = cur.current ? [...strokes, cur.current] : strokes;
    for (const s of all) drawStroke(ctx, s);
  }, [strokes, grayscale]);

  useEffect(() => { redraw(); }, [redraw, imgDims]);

  const pos = (e) => {
    const r = canvasRef.current.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - r.left) * (canvasRef.current.width / r.width),
      y: (t.clientY - r.top) * (canvasRef.current.height / r.height),
    };
  };

  const nearStroke = (s, p) => {
    if (!s) return false;
    const d = 12;
    if (s.type === "pen") return s.points.some((pt) => Math.hypot(pt.x - p.x, pt.y - p.y) < d);
    if (s.type === "text") return Math.abs(p.x - s.x) < 120 && Math.abs(p.y - s.y) < s.size + 6;
    const minX = Math.min(s.x0, s.x1) - d, maxX = Math.max(s.x0, s.x1) + d;
    const minY = Math.min(s.y0, s.y1) - d, maxY = Math.max(s.y0, s.y1) + d;
    return p.x > minX && p.x < maxX && p.y > minY && p.y < maxY;
  };

  const eraseAt = (p) => {
    setStrokes((curr) => {
      const hit = [...curr].reverse().find((s) => nearStroke(s, p));
      return hit ? curr.filter((s) => s.id !== hit.id) : curr;
    });
  };

  const start = (e) => {
    e.preventDefault();
    const p = pos(e);
    if (tool === "text") { setTextInput({ x: p.x, y: p.y, value: "" }); return; }
    if (tool === "erase") { setDrawing(true); eraseAt(p); return; }
    setDrawing(true);
    if (tool === "pen") cur.current = { id: uid(), type: "pen", color, width, points: [p] };
    else cur.current = { id: uid(), type: tool, color, width, x0: p.x, y0: p.y, x1: p.x, y1: p.y };
  };

  const move = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const p = pos(e);
    if (tool === "erase") { eraseAt(p); return; }
    if (tool === "pen") cur.current.points.push(p);
    else { cur.current.x1 = p.x; cur.current.y1 = p.y; }
    redraw();
  };

  const end = () => {
    if (!drawing) return;
    setDrawing(false);
    if (tool === "erase") return;
    const finished = cur.current;
    cur.current = null;
    if (finished) setStrokes((s) => [...s, finished]);
  };

  const commitText = () => {
    if (textInput && textInput.value.trim()) {
      setStrokes((s) => [...s, {
        id: uid(), type: "text", color, text: textInput.value,
        x: textInput.x, y: textInput.y, size: Math.max(18, width * 6),
      }]);
    }
    setTextInput(null);
  };

  const undo = () => setStrokes((s) => s.slice(0, -1));
  const save = () => { cur.current = null; onSave({ strokes, grayscale }); };

  const tools = [
    { id: "pen", icon: "✏️", label: "畫筆" },
    { id: "arrow", icon: "↗", label: "箭頭" },
    { id: "rect", icon: "▢", label: "方框" },
    { id: "text", icon: "T", label: "文字" },
    { id: "erase", icon: "🧽", label: "橡皮擦" },
  ];

  return h('div', { style: S.modalOverlay },
    h('div', { style: S.annotatorBox },
      h('div', { style: S.annotatorBar },
        h('div', { style: { display: "flex", gap: 6 } },
          ...tools.map((t) =>
            h('button', { key: t.id, onClick: () => setTool(t.id), title: t.label,
              style: { ...S.toolBtn, ...(tool === t.id ? S.toolBtnActive : {}) } }, t.icon)),
          h('button', { onClick: undo, title: "復原", style: S.toolBtn }, '⟲'),
          h('button', { onClick: () => setGrayscale(g => !g), title: "黑白底圖",
            style: { ...S.toolBtn, ...(grayscale ? S.toolBtnActive : {}) } }, '◐')
        ),
        h('div', { style: { display: "flex", alignItems: "center", gap: 10 } },
          h('div', { style: { display: "flex", gap: 5 } },
            ...COLORS.map((c) =>
              h('button', { key: c, onClick: () => setColor(c),
                style: { ...S.swatch, background: c, outline: color === c ? "2px solid #fff" : "1px solid #475569", outlineOffset: 2 } }))),
          h('input', { type: "range", min: 2, max: 14, value: width,
            onChange: (e) => setWidth(+e.target.value), style: { width: 80 } })
        ),
        h('div', { style: { display: "flex", gap: 8 } },
          h('button', { onClick: onClose, style: S.ghostBtn }, '取消'),
          h('button', { onClick: save, style: S.primaryBtn }, '✓ 完成'))
      ),
      h('div', { style: S.canvasWrap },
        h('div', { style: { position: "relative", width: imgDims.w, maxWidth: "100%" } },
          h('canvas', {
            ref: canvasRef, width: imgDims.w, height: imgDims.h,
            style: { width: "100%", display: "block", borderRadius: 8, touchAction: "none", cursor: tool === "text" ? "text" : "crosshair" },
            onMouseDown: start, onMouseMove: move, onMouseUp: end, onMouseLeave: end,
            onTouchStart: start, onTouchMove: move, onTouchEnd: end
          }),
          textInput && h('input', {
            autoFocus: true, value: textInput.value,
            onChange: (e) => setTextInput({ ...textInput, value: e.target.value }),
            onBlur: commitText, onKeyDown: (e) => e.key === "Enter" && commitText(),
            placeholder: "輸入文字後按 Enter",
            style: {

            }
          })
        )
      )
    )
  );
}

function Lightbox({ image, onClose }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  useEffect(() => {
    const img = document.createElement('img');
    img.onload = () => {
      const c = canvasRef.current; if (!c) return;
      const maxW = window.innerWidth * 0.92;
      const maxH = window.innerHeight * 0.86;
      const scale = Math.min(1, maxW / img.width, maxH / img.height);
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      const ctx = c.getContext('2d');
      if (image.grayscale) ctx.filter = 'grayscale(100%)';
      ctx.drawImage(img, 0, 0, c.width, c.height);
      ctx.filter = 'none';
      const annotatorScale = Math.min(1, 1400 / img.width);
      const ratio = c.width / (img.width * annotatorScale);
      for (const s of (image.strokes || [])) {
        if (!s || !s.color) continue;
        ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
        ctx.lineWidth = s.width * ratio; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (s.type === 'pen') {
          ctx.beginPath();
          s.points.forEach((p, i) => (i ? ctx.lineTo(p.x * ratio, p.y * ratio) : ctx.moveTo(p.x * ratio, p.y * ratio)));
          ctx.stroke();
        } else if (s.type === 'rect') {
          ctx.strokeRect(s.x0 * ratio, s.y0 * ratio, (s.x1 - s.x0) * ratio, (s.y1 - s.y0) * ratio);
        } else if (s.type === 'arrow') {
          const x0 = s.x0 * ratio, y0 = s.y0 * ratio, x1 = s.x1 * ratio, y1 = s.y1 * ratio;
          const head = (10 + s.width * 2) * ratio;
          const ang = Math.atan2(y1 - y0, x1 - x0);
          ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x1, y1);
          ctx.lineTo(x1 - head * Math.cos(ang - Math.PI / 6), y1 - head * Math.sin(ang - Math.PI / 6));
          ctx.lineTo(x1 - head * Math.cos(ang + Math.PI / 6), y1 - head * Math.sin(ang + Math.PI / 6));
          ctx.closePath(); ctx.fill();
        } else if (s.type === 'text') {
          ctx.font = `${s.size * ratio}px -apple-system, "PingFang TC", sans-serif`;
          ctx.textBaseline = 'top';
          ctx.fillText(s.text, s.x * ratio, s.y * ratio);
        }
      }
    };
    img.src = image.dataUrl;
  }, [image]);
  return h('div', { style: { ...S.modalOverlay, cursor: 'zoom-out' }, onClick: (e) => e.target === e.currentTarget && onClose() },
    h('div', { style: { position: 'relative' } },
      h('button', { onClick: onClose, style: { position: 'absolute', top: -44, right: 0, background: 'rgba(255,255,255,.2)', color: '#fff', border: 'none', borderRadius: 8, padding: '8px 16px', cursor: 'pointer', fontSize: 14 } }, '✕ 關閉'),
      h('canvas', { ref: canvasRef, style: { display: 'block', borderRadius: 10, maxWidth: '92vw', maxHeight: '86vh' } })
    )
  );
}

    return () => window.removeEventListener('beforeunload', onBeforeUnload);
  }, []);

  const getSafeTime = (val) => {
    if (!val) return 0;
    if (typeof val.toMillis === 'function') return val.toMillis();
    if (typeof val === 'number') return val;
    if (val.seconds) return val.seconds * 1000;
    return new Date(val).getTime() || 0;

    return onSnapshot(q, (snap) => setProjects(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

    ns.docs.forEach(d => batch.delete(d.ref));
    const ts = await getDocs(query(collection(db, `users/${user.uid}/tasks`), where("projectId", "==", id)));
    ts.docs.forEach(d => batch.delete(d.ref));
    batch.delete(doc(db, `users/${user.uid}/projects/${id}`));
    await batch.commit();
    setPermDelConfirm(null);
  };

  // Notes
  const addNote = async () => {
    saveIfDirtyRef.current?.();
    isDirty.current = false;
    setSaveStatus('idle');
    try {
      const newNote = {
        projectId: activeProject.id, title: "", body: "", images: [], deleted: false, pinned: false, sortOrder: Date.now(),
        created: serverTimestamp(), updated: serverTimestamp(),
      };
      const docRef = await addDoc(collection(db, `users/${user.uid}/notes`), newNote);
      setActiveNote({ id: docRef.id, ...newNote });
      setMobileView('editor'); // 新增筆記後，手機自動切到編輯畫面
    } catch (err) { alert("新增筆記失敗：" + err.message); }
  };
  
  const updateNoteFields = (patch) => {
    lastLocalEdit.current = Date.now();
    setActiveNote(cur => ({ ...cur, ...patch }));
    isDirty.current = true;
    setSaveStatus('unsaved');
    if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current = setTimeout(() => doAutoSaveRef.current?.(), 2000);
  };

  const manualSaveNote = async () => {
    if (!activeNote?.id) return;
    if (autoSaveTimer.current) { clearTimeout(autoSaveTimer.current); autoSaveTimer.current = null; }
    isDirty.current = false;
    setSaveStatus('saving');
    try {
      await updateDoc(doc(db, `users/${user.uid}/notes/${activeNote.id}`), {
        title: activeNote.title || '',
        body: activeNote.body || '',
        updated: serverTimestamp()
      });
      setSaveStatus('saved');
      alert('💾 筆記儲存成功！');
    } catch (err) {
      isDirty.current = true;
      setSaveStatus('unsaved');
      alert('儲存失敗：' + err.message);
    }
  };

  const updateNoteNow = async (patch) => {
    lastLocalEdit.current = Date.now();
    setActiveNote(cur => ({ ...cur, ...patch }));
    try {
      await updateDoc(doc(db, `users/${user.uid}/notes/${activeNote.id}`), { ...patch, updated: serverTimestamp() });
    } catch (err) {
      if (err.message.includes('exceeds')) alert("筆記太大了（超過 1MB）。請刪除幾張照片。");
      else alert("儲存失敗：" + err.message);
      throw err;
    }
  };
  const undoBodyEdit = () => {
    if (!bodyUndoStack.current.length) return;
    const prev = bodyUndoStack.current.pop();
    setCanBodyUndo(bodyUndoStack.current.length > 0);
    updateNoteFields({ body: prev });
  };
  const trashNote = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/notes/${id}`), { deleted: true, deletedAt: serverTimestamp() });
    if (activeNote?.id === id) { setActiveNote(null); setMobileView('list'); }
    setConfirmDel(null);
  };
  const restoreNote = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/notes/${id}`), { deleted: false, deletedAt: null });
  };
  const permDelNote = async (id) => {
    await deleteDoc(doc(db, `users/${user.uid}/notes/${id}`));
    setPermDelConfirm(null);
  };
  const onPickImage = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length || !activeNote) return;
    setUploading(true);
    try {
      const newImages = [...(activeNote.images || [])];
      for (const f of files) {
        const dataUrl = await compressImage(f);
        newImages.push({ id: uid(), dataUrl, strokes: [], grayscale: false });
      }
      const fakeNote = { ...activeNote, images: newImages };
      if (estimateNoteSize(fakeNote) > 950000) {
        alert("加入這些照片後筆記會超過 1MB 上限。請刪除舊照片或新建一個筆記再加。");
        return;
      }
      await updateNoteNow({ images: newImages });
    } catch (err) { }
    finally { setUploading(false); }
  };
  const saveAnnotation = async ({ strokes, grayscale }) => {
    if (annotating.type === 'task') {
      const task = tasks.find(t => t.id === annotating.id);
      const imgs = task.images.map((im, i) => i === annotating.imgIndex ? { ...im, strokes, grayscale } : im);
      await updateDoc(doc(db, `users/${user.uid}/tasks/${annotating.id}`), { images: imgs });
    } else {
      const imgs = activeNote.images.map((im, i) => i === annotating.imgIndex ? { ...im, strokes, grayscale } : im);
      await updateNoteNow({ images: imgs });
    }
    setAnnotating(null);
  };
  const delImage = async (i) => {
    await updateNoteNow({ images: activeNote.images.filter((_, idx) => idx !== i) });
    setConfirmDel(null);
  };
  const rotateImage = async (imgIndex, deg) => {
    if (!activeNote) return;
    try {
      const newDataUrl = await rotateImageData(activeNote.images[imgIndex].dataUrl, deg);
      const newImages = activeNote.images.map((im, i) =>
        i === imgIndex ? { ...im, dataUrl: newDataUrl, strokes: [] } : im
      );
      await updateNoteNow({ images: newImages });
    } catch (err) { alert('旋轉失敗：' + err.message); }
  };

  const onPickTaskImage = async (taskId, e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length) return;
    try {
      const task = tasks.find(t => t.id === taskId);
      const newImages = [...(task?.images || [])];
      for (const f of files) {
        const dataUrl = await compressImage(f);
        newImages.push({ id: uid(), dataUrl, strokes: [], grayscale: false });
      }
      await updateDoc(doc(db, `users/${user.uid}/tasks/${taskId}`), { images: newImages });
    } catch (err) { alert('加入照片失敗：' + err.message); }
  };
  const delTaskImage = async (taskId, imgIndex) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    await updateDoc(doc(db, `users/${user.uid}/tasks/${taskId}`), { images: task.images.filter((_, i) => i !== imgIndex) });
    setConfirmDel(null);
  };
  const rotateTaskImage = async (taskId, imgIndex, deg) => {
    try {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      const newDataUrl = await rotateImageData(task.images[imgIndex].dataUrl, deg);
      const newImages = task.images.map((im, i) => i === imgIndex ? { ...im, dataUrl: newDataUrl, strokes: [] } : im);
      await updateDoc(doc(db, `users/${user.uid}/tasks/${taskId}`), { images: newImages });
    } catch (err) { alert('旋轉失敗：' + err.message); }
  };

  // Tasks
  const addTask = async (title) => {
    try {
      const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("連線逾時")), 5000));
      const addPromise = addDoc(collection(db, `users/${user.uid}/tasks`), {
        projectId: activeProject.id, title, done: false, deleted: false, images: [], pinned: false, sortOrder: Date.now(),
        created: serverTimestamp(),
      });
      await Promise.race([addPromise, timeout]);
      scrollToBottomRef.current = true;
      setNewTaskModal(false);
    } catch (err) {
      if (err.message === "連線逾時") alert("新增失敗：連線逾時！\n\n👉 請檢查 Firebase 連線狀態。");
      else alert("新增任務失敗：" + err.message);
      throw err;
    }
  };
  const completeTask = async (reason) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${completeTaskId}`), {
      done: true, doneReason: reason, doneAt: serverTimestamp()
    });
    scrollToBottomRef.current = true;
    setCompleteTaskId(null);
  };
  const uncompleteTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), {
      done: false, doneReason: null, doneAt: null
    });
  };
  const reorder = async (type, items, fromId, toId) => {
    const fromIdx = items.findIndex(it => it.id === fromId);
    const toIdx   = items.findIndex(it => it.id === toId);
    if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
    const arr = [...items];
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, moved);
    const batch = writeBatch(db);
    const col = type === 'project' ? `users/${user.uid}/projects`
      : type === 'note' ? `users/${user.uid}/notes`
      : `users/${user.uid}/tasks`;
    arr.forEach((item, idx) => batch.update(doc(db, `${col}/${item.id}`), { sortOrder: (idx + 1) * 1000 }));
    await batch.commit();
  };
  const toggleProjectPin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/projects/${id}`), { pinned: !pinned });
  };
  const toggleNotePin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/notes/${id}`), { pinned: !pinned });
  };
  const toggleTaskPin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { pinned: !pinned });
  };
  const updateTaskTitle = async (id, title) => {
    if (!title.trim()) { setEditingTask(null); return; }
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { title: title.trim() });
    setEditingTask(null);
  };
  const trashTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { deleted: true, deletedAt: serverTimestamp() });
    setConfirmDel(null);
  };
  const restoreTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { deleted: false, deletedAt: null });
  };
  const permDelTask = async (id) => {
    await deleteDoc(doc(db, `users/${user.uid}/tasks/${id}`));
    setPermDelConfirm(null);
  };

  const BACKUP_LS_KEY = `lastBackupAt_${user?.uid || ''}`;

  const exportBackup = async () => {
    setBackupLoading(true);
    try {
      const [projSnap, noteSnap, taskSnap] = await Promise.all([
        getDocs(collection(db, `users/${user.uid}/projects`)),
        getDocs(collection(db, `users/${user.uid}/notes`)),
        getDocs(collection(db, `users/${user.uid}/tasks`)),
      ]);
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        uid: user.uid,
        projects: projSnap.docs.map(d => ({ id: d.id, ...d.data() })),
        notes:    noteSnap.docs.map(d => ({ id: d.id, ...d.data() })),
        tasks:    taskSnap.docs.map(d => ({ id: d.id, ...d.data() })),
      };
      const json = JSON.stringify(data, (_, v) =>
        v && typeof v.toDate === 'function' ? v.toDate().toISOString() : v, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `照片筆記備份_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      localStorage.setItem(BACKUP_LS_KEY, Date.now().toString());
      alert(`✅ 備份完成！\n\n專案 ${data.projects.length} 個、筆記 ${data.notes.length} 筆、任務 ${data.tasks.length} 個。\n\n請妥善保存備份檔案。`);
    } catch (err) { alert('備份失敗：' + err.message); }
    finally { setBackupLoading(false); }
  };

  const importBackup = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;
    let data;
    try { data = JSON.parse(await file.text()); } catch { alert('檔案格式錯誤，請選擇正確的備份檔案。'); return; }
    if (!data.version || !Array.isArray(data.projects) || !Array.isArray(data.notes)) {
      alert('備份檔案格式不符，無法還原。'); return;
    }
    const ok = window.confirm(
      `準備還原備份：\n• 專案 ${data.projects.length} 個\n• 筆記 ${data.notes.length} 筆\n• 任務 ${(data.tasks||[]).length} 個\n\n` +
      `備份時間：${new Date(data.exportedAt).toLocaleString()}\n\n` +
      `這會在現有資料以外「新增」備份中缺少的項目，不會刪除或覆蓋既有資料。確定繼續？`
    );
    if (!ok) return;
    setBackupLoading(true);
    try {
      const [ep, en, et] = await Promise.all([
        getDocs(collection(db, `users/${user.uid}/projects`)),
        getDocs(collection(db, `users/${user.uid}/notes`)),
        getDocs(collection(db, `users/${user.uid}/tasks`)),
      ]);
      const existP = new Set(ep.docs.map(d => d.id));
      const existN = new Set(en.docs.map(d => d.id));
      const existT = new Set(et.docs.map(d => d.id));
      const items = [
        ...(data.projects||[]).filter(p => !existP.has(p.id)).map(p => ({ col: 'projects', ...p })),
        ...(data.notes||[]).filter(n => !existN.has(n.id)).map(n => ({ col: 'notes', ...n })),
        ...(data.tasks||[]).filter(t => !existT.has(t.id)).map(t => ({ col: 'tasks', ...t })),
      ];
      if (items.length === 0) { alert('備份中的所有資料在目前帳號已存在，無需還原。'); setBackupLoading(false); return; }
      for (let i = 0; i < items.length; i += 400) {
        const batch = writeBatch(db);
        items.slice(i, i + 400).forEach(({ col, id, ...fields }) =>
          batch.set(doc(db, `users/${user.uid}/${col}/${id}`), fields));
        await batch.commit();
      }
      alert(`✅ 還原完成！共新增 ${items.length} 筆資料。`);
    } catch (err) { alert('還原失敗：' + err.message); }
    finally { setBackupLoading(false); }
  };

  doAutoSaveRef.current = async () => {
    const note = activeNoteRef.current;
    if (!note?.id || !isDirty.current) return;
    isDirty.current = false;
    setSaveStatus('saving');
    try {
      await updateDoc(doc(db, `users/${user.uid}/notes/${note.id}`), {
        title: note.title || '',
        body: note.body || '',
        updated: serverTimestamp()
      });
      setSaveStatus('saved');
    } catch (err) {
      isDirty.current = true;
      setSaveStatus('unsaved');
    }
  };
  saveIfDirtyRef.current = () => {
    if (!isDirty.current) return;
    const note = activeNoteRef.current;
    if (!note?.id) return;
    if (autoSaveTimer.current) { clearTimeout(autoSaveTimer.current); autoSaveTimer.current = null; }
    isDirty.current = false;
    updateDoc(doc(db, `users/${user.uid}/notes/${note.id}`), {
      title: note.title || '',
      body: note.body || '',
      updated: serverTimestamp()
    }).catch(() => {});
  };

  if (!authReady) return h('div', { style: { ...S.app, alignItems: 'center', justifyContent: 'center' } }, '載入中…');
  if (!user) return h(Login);

  const offlineBanner = isOffline && h('div', {
    style: { position: 'fixed', top: 0, left: 0, right: 0, background: '#fef3c7', color: '#92400e', padding: '6px 14px', fontSize: 12.5, textAlign: 'center', zIndex: 300, borderBottom: '1px solid #fde68a' }
  }, '📵 離線模式 — 顯示快取資料，新增與修改將在恢復連線後同步');

  // 排序優先順序：釘選 > 拖曳自訂順序(sortOrder) > 預設排序
  const byOrder = (a, b) => {
    const pin = (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    if (pin !== 0) return pin;
    if (a.sortOrder != null && b.sortOrder != null) return a.sortOrder - b.sortOrder;
    if (a.sortOrder != null) return -1;
    if (b.sortOrder != null) return 1;
    return 0;
  };
  const activeProjects = projects.filter(p => !p.deleted).sort((a, b) =>
    byOrder(a, b) || getSafeTime(b.created) - getSafeTime(a.created));
  const deletedProjects = projects.filter(p => p.deleted);
  const visibleNotes = notes.filter(n => !n.deleted);
  const visibleTasks = tasks.filter(t => !t.deleted);

  const sortedNotes = [...visibleNotes].sort((a, b) => {
    const ord = byOrder(a, b); if (ord !== 0) return ord;
    if (noteSort === 'name') return (a.title || '').localeCompare(b.title || '');
    if (noteSort === 'created') return getSafeTime(b.created) - getSafeTime(a.created);
    return getSafeTime(b.updated) - getSafeTime(a.updated);
  });
  const sortedTasks = [...visibleTasks].sort((a, b) => {
    // 已完成永遠排最底
    const doneOrd = (a.done ? 1 : 0) - (b.done ? 1 : 0);
    if (doneOrd !== 0) return doneOrd;
    const ord = byOrder(a, b); if (ord !== 0) return ord;
    if (taskSort === 'name') return (a.title || '').localeCompare(b.title || '');
    return getSafeTime(b.created) - getSafeTime(a.created);
  });
  const filtered = sortedNotes.filter((n) => !search || (n.title || '').includes(search) || (n.body || '').includes(search));

  let noteSize = 0, sizePct = 0;
  if (activeNote) {
    noteSize = estimateNoteSize(activeNote);
    sizePct = Math.min(100, Math.round(noteSize / 10000));
  }

  // 手機向左滑 → 上一頁，向右滑 → 下一頁
  const swipeHandlers = (view) => ({
    onTouchStart: (e) => {
      const t = e.touches[0];
      swipeStart.current = { x: t.clientX, y: t.clientY };
    },
    onTouchEnd: (e) => {
      if (!swipeStart.current) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - swipeStart.current.x;
      const dy = t.clientY - swipeStart.current.y;
      swipeStart.current = null;
      if (Math.abs(dy) > Math.abs(dx) || Math.abs(dx) < 60) return;
      if (dx < 0) {
        // 向左滑 → 上一頁
        if (view === 'editor') { saveIfDirtyRef.current?.(); setMobileView('list'); }
        else if (view === 'list' || view === 'trash') setMobileView('sidebar');
      } else {
        // 向右滑 → 下一頁
        if (view === 'sidebar' && activeProject) setMobileView('list');
        else if (view === 'list' && activeNote && tab === 'notes') setMobileView('editor');
      }
    },
  });

  // 渲染專案列表 (Sidebar)
  const sidebar = h('aside', { className: mobileView === 'sidebar' ? 'mobile-full-width' : 'hide-on-mobile', style: S.sidebar, ...swipeHandlers('sidebar') },
    h('div', { style: S.brand }, '📷 照片筆記'),
    !showTrash && (creatingProj
      ? h(NewProjectInput, { onConfirm: createProject, onCancel: () => setCreatingProj(false) })
      : h('button', { onClick: () => setCreatingProj(true), style: S.newProjBtn }, '+ 新增專案')),
    h('div', { style: { overflowY: "auto", flex: 1, marginTop: 4 } },
      !showTrash && activeProjects.length === 0 && !creatingProj && h('div', { style: S.empty }, '還沒有專案'),
      !showTrash && activeProjects.map((p) =>
        h(ProjectItem, {
          key: p.id, project: p, isActive: activeProject?.id === p.id,
          onClick: () => { saveIfDirtyRef.current?.(); setSaveStatus('idle'); setActiveProject(p); setActiveNote(null); setSearch(""); setTab('notes'); setMobileView('list'); },
          onRename: (name) => renameProject(p.id, name),
          onDelete: () => setConfirmDel({ type: "project", id: p.id }),
          confirmingDelete: confirmDel?.type === "project" && confirmDel.id === p.id,
          onConfirmDelete: () => trashProject(p.id),
          onCancelDelete: () => setConfirmDel(null),
          onTogglePin: () => toggleProjectPin(p.id, p.pinned),
          dragHandlers: {
            draggable: true,
            onDragStart: (e) => { dragId.current = p.id; dragType.current = 'project'; e.dataTransfer.effectAllowed = 'move'; e.currentTarget.style.opacity = '0.4'; },
            onDragEnd:   (e) => { e.currentTarget.style.opacity = '1'; dragId.current = null; },
            onDragOver:  (e) => { e.preventDefault(); e.currentTarget.style.background = '#f0fdfa'; },
            onDragLeave: (e) => { e.currentTarget.style.background = ''; },
            onDrop:      (e) => { e.preventDefault(); e.currentTarget.style.background = ''; if (dragId.current && dragId.current !== p.id && dragType.current === 'project') reorder('project', activeProjects, dragId.current, p.id); dragId.current = null; },
          },
        }))
    ),
    h('button', {
      onClick: () => {
        saveIfDirtyRef.current?.();
        setSaveStatus('idle');
        setShowTrash(t => {
          const isOpening = !t;
          setMobileView(isOpening ? 'list' : 'sidebar');
          return isOpening;
        });
        setActiveProject(null); setActiveNote(null);
      },
      style: { ...S.trashBtn, ...(showTrash ? S.trashBtnActive : {}) }
    }, '🗑️ 垃圾桶'),
    (() => {
      const lastBackup = parseInt(localStorage.getItem(BACKUP_LS_KEY) || '0');
      const daysSince = lastBackup ? Math.floor((Date.now() - lastBackup) / 86400000) : null;
      const overdue = daysSince === null || daysSince >= 7;
      return h('div', { style: { borderTop: '1px solid #f1f5f9', paddingTop: 8, marginTop: 4 } },
        overdue && h('div', { style: { fontSize: 11, color: '#92400e', background: '#fef3c7', border: '1px solid #fde68a', borderRadius: 6, padding: '5px 8px', marginBottom: 6, lineHeight: 1.4 } },
          daysSince === null ? '⚠️ 尚未備份過，建議定期備份防止資料遺失。' : `⚠️ 已 ${daysSince} 天未備份，建議備份一次。`
        ),
        !overdue && h('div', { style: { fontSize: 11, color: '#64748b', marginBottom: 4 } },
          `上次備份：${daysSince === 0 ? '今天' : `${daysSince} 天前`}`
        ),
        h('div', { style: { display: 'flex', gap: 4 } },
          h('button', {
            onClick: exportBackup, disabled: backupLoading,
            style: { flex: 1, fontSize: 11.5, padding: '6px 4px', background: '#f0fdfa', color: '#0d9488', border: '1px solid #99f6e4', borderRadius: 6, cursor: backupLoading ? 'default' : 'pointer', opacity: backupLoading ? 0.6 : 1 }
          }, backupLoading ? '處理中…' : '📤 備份資料'),
          h('label', {
            style: { flex: 1, fontSize: 11.5, padding: '6px 4px', background: '#f8fafc', color: '#64748b', border: '1px solid #e5e7eb', borderRadius: 6, cursor: backupLoading ? 'default' : 'pointer', textAlign: 'center', opacity: backupLoading ? 0.6 : 1, pointerEvents: backupLoading ? 'none' : 'auto' }
          },
            '📥 還原備份',
            h('input', { type: 'file', accept: '.json,application/json', onChange: importBackup, style: { display: 'none' } })
          )
        )
      );
    })(),
    h('div', { style: S.userBar },
      h('div', { style: S.userInfo },
        user.photoURL && h('img', { src: user.photoURL, alt: '', style: S.avatar, referrerPolicy: 'no-referrer' }),
        h('span', { style: S.userName }, user.displayName || user.email)),
      h('button', { onClick: () => signOut(auth), style: { ...S.miniBtn, background: '#f1f5f9', color: '#64748b', width: 30, height: 30 }, title: '登出' }, '⎋'))
  );

  // 垃圾桶視圖
  if (showTrash) {
    const trashEmpty = deletedProjects.length === 0 && allDeletedNotes.length === 0 && allDeletedTasks.length === 0;
    return h('div', { style: S.app },
      offlineBanner,
      sidebar,
      h('main', { className: mobileView === 'list' ? 'mobile-full-width' : 'hide-on-mobile', style: { ...S.editorCol, padding: 24, overflowY: 'auto' }, ...swipeHandlers('trash') },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 } },
          h('button', { className: 'mobile-only', onClick: () => setMobileView('sidebar'), style: { background: 'none', border: 'none', fontSize: 24, padding: '0 8px', cursor: 'pointer', color: '#64748b' } }, '‹'),
          h('h2', { style: { margin: 0 } }, '🗑️ 垃圾桶')
        ),
        h('p', { style: { color: '#64748b', fontSize: 13 } }, '在這裡可以還原刪除的項目，或永久刪除釋放空間。'),
        trashEmpty && h('div', { style: { ...S.placeholder, height: 200 } }, '垃圾桶是空的'),
        deletedProjects.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除專案 (${deletedProjects.length})`),
          ...deletedProjects.map(p => h('div', { key: p.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `📁 ${p.name}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(p.deletedAt)}　會連同其中所有筆記與任務一併處理`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreProject(p.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'project' && permDelConfirm.id === p.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelProject(p.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'project', id: p.id }), style: S.miniDanger }, '永久刪除'))
          ))
        ),
        allDeletedNotes.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除筆記 (${allDeletedNotes.length})`),
          ...allDeletedNotes.map(n => h('div', { key: n.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `📝 ${n.title || '未命名筆記'}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(n.deletedAt)}　${(n.images?.length || 0)} 張照片`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreNote(n.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'note' && permDelConfirm.id === n.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelNote(n.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'note', id: n.id }), style: S.miniDanger }, '永久刪除'))
          ))
        ),
        allDeletedTasks.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除任務 (${allDeletedTasks.length})`),
          ...allDeletedTasks.map(t => h('div', { key: t.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `${t.done ? '✓' : '○'} ${t.title}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(t.deletedAt)}`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreTask(t.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'task' && permDelConfirm.id === t.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelTask(t.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'task', id: t.id }), style: S.miniDanger }, '永久刪除'))
          ))
        )
      )
    );
  }

  return h('div', { style: S.app },
    offlineBanner,
    sidebar,

    // 渲染清單 (List Column)
    activeProject && h('section', { className: mobileView === 'list' ? 'mobile-full-width' : 'hide-on-mobile', style: S.listCol, ...swipeHandlers('list') },
      h('div', { style: S.listHead },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
          h('button', { className: 'mobile-only', onClick: () => setMobileView('sidebar'), style: { background: 'none', border: 'none', fontSize: 24, padding: '0 4px', cursor: 'pointer', color: '#64748b' } }, '‹'),
          h('strong', { style: { fontSize: 15 } }, activeProject.name)
        ),
        tab === 'notes'
          ? h('button', { onClick: addNote, style: S.primaryBtnSm }, '+ 新筆記')
          : h('button', { onClick: () => setNewTaskModal(true), style: S.primaryBtnSm }, '+ 新任務')
      ),
      h('div', { style: S.tabBar },
        h('div', { onClick: () => setTab('notes'), style: { ...S.tab, ...(tab === 'notes' ? S.tabActive : {}) } }, `筆記 (${visibleNotes.length})`),
        h('div', { onClick: () => setTab('tasks'), style: { ...S.tab, ...(tab === 'tasks' ? S.tabActive : {}) } },
          `任務 (${sortedTasks.filter(t => !t.done).length}/${sortedTasks.length})`)
      ),
      
      dbError && h('div', { style: { background: '#fecaca', color: '#991b1b', padding: '10px 14px', margin: '14px 14px 0', borderRadius: '8px', fontSize: '13px', fontWeight: 'bold' } }, `⚠️ ${dbError}`),

      tab === 'notes' && h('div', { style: S.searchBox },
        h('span', null, '🔍'),
        h('input', { value: search, onChange: (e) => setSearch(e.target.value), placeholder: '搜尋筆記…', style: S.searchInput }),
        h('select', { value: noteSort, onChange: (e) => setNoteSort(e.target.value),
          style: { border: 'none', background: 'transparent', color: '#94a3b8', fontSize: 11, cursor: 'pointer', outline: 'none', flexShrink: 0 } },
          h('option', { value: 'updated' }, '最近編輯'),
          h('option', { value: 'created' }, '建立時間'),
          h('option', { value: 'name' }, '名稱 A-Z'))
      ),
      h('div', { ref: taskListRef, style: { overflowY: "auto", flex: 1 } },
        tab === 'notes' && h('div', null,
          filtered.length === 0 && h('div', { style: S.empty }, search ? '找不到符合的筆記' : '點「新筆記」開始'),
          ...filtered.map((n) =>
            h('div', { key: n.id,
              onClick: () => { saveIfDirtyRef.current?.(); setSaveStatus('idle'); setActiveNote(n); setMobileView('editor'); },
              draggable: true,
              onDragStart: (e) => { dragId.current = n.id; dragType.current = 'note'; e.dataTransfer.effectAllowed = 'move'; e.currentTarget.style.opacity = '0.4'; },
              onDragEnd:   (e) => { e.currentTarget.style.opacity = '1'; dragId.current = null; },
              onDragOver:  (e) => { e.preventDefault(); e.currentTarget.style.borderTop = '2px solid #0d9488'; },
              onDragLeave: (e) => { e.currentTarget.style.borderTop = ''; },
              onDrop:      (e) => { e.preventDefault(); e.currentTarget.style.borderTop = ''; if (dragId.current && dragId.current !== n.id && dragType.current === 'note') reorder('note', filtered, dragId.current, n.id); dragId.current = null; },
              style: { ...S.noteItem, ...(activeNote?.id === n.id ? S.noteItemActive : {}) } },
              h('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center", gap: 4 } },
                h('span', { style: { cursor: 'grab', color: '#cbd5e1', fontSize: 12, userSelect: 'none', flexShrink: 0 } }, '⠿'),
                n.pinned && h('span', { style: { fontSize: 11, color: '#0d9488', flexShrink: 0 } }, '📌'),
                h('span', { style: { fontWeight: 600, fontSize: 14, color: "#1f2937", flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, n.title || '未命名筆記'),
                h('span', { onClick: (e) => { e.stopPropagation(); toggleNotePin(n.id, n.pinned); },
                  title: n.pinned ? '取消釘選' : '釘選',
                  style: { cursor: 'pointer', fontSize: 11, opacity: n.pinned ? 1 : 0.2, color: '#0d9488', flexShrink: 0 } }, '📌'),
                (n.images?.length > 0) && h('span', { style: S.imgBadge }, `📷 ${n.images.length}`)),
              h('div', { style: S.notePreview }, n.body || '（無內容）'),
              h('div', { style: S.noteDate }, fmt(n.updated))
            ))
        ),
        tab === 'tasks' && h('div', null,
          h('div', { style: { display: 'flex', alignItems: 'center', padding: '6px 14px', borderBottom: '1px solid #f1f5f9', gap: 4 } },
            h('span', { style: { fontSize: 11, color: '#94a3b8' } }, '排序'),
            h('select', { value: taskSort, onChange: (e) => setTaskSort(e.target.value),
              style: { border: 'none', background: 'transparent', color: '#94a3b8', fontSize: 11, cursor: 'pointer', outline: 'none' } },
              h('option', { value: 'created' }, '建立時間'),
              h('option', { value: 'name' }, '名稱 A-Z'),
              h('option', { value: 'done' }, '未完成優先'))
          ),
          sortedTasks.length === 0 && h('div', { style: S.empty }, '點「新任務」開始'),
          ...sortedTasks.map(t =>
            h('div', { key: t.id,
              draggable: true,
              onDragStart: (e) => { dragId.current = t.id; dragType.current = 'task'; e.dataTransfer.effectAllowed = 'move'; e.currentTarget.style.opacity = '0.4'; },
              onDragEnd:   (e) => { e.currentTarget.style.opacity = '1'; dragId.current = null; },
              onDragOver:  (e) => { e.preventDefault(); e.currentTarget.style.borderTop = '2px solid #0d9488'; },
              onDragLeave: (e) => { e.currentTarget.style.borderTop = ''; },
              onDrop:      (e) => { e.preventDefault(); e.currentTarget.style.borderTop = ''; if (dragId.current && dragId.current !== t.id && dragType.current === 'task') reorder('task', sortedTasks, dragId.current, t.id); dragId.current = null; },
              style: S.taskItem },
              h('span', { style: { cursor: 'grab', color: '#cbd5e1', fontSize: 12, userSelect: 'none', alignSelf: 'flex-start', paddingTop: 3, marginRight: -4 } }, '⠿'),
              h('div', {
                onClick: () => { if (t.done) uncompleteTask(t.id); else setCompleteTaskId(t.id); },
                style: { ...S.taskCheck, ...(t.done ? S.taskCheckDone : {}) }
              }, t.done ? '✓' : ''),
              h('div', { style: { flex: 1 } },
                h('div', { style: { display: 'flex', alignItems: 'flex-start', gap: 6 } },
                  h('div', { style: { flex: 1 } },
                    editingTask?.id === t.id
                      ? h('input', {
                          autoFocus: true,
                          value: editingTask.title,
                          onChange: (e) => setEditingTask({ ...editingTask, title: e.target.value }),
                          onKeyDown: (e) => {
                            if (e.key === 'Enter') updateTaskTitle(editingTask.id, editingTask.title);
                            if (e.key === 'Escape') setEditingTask(null);
                          },
                          onBlur: () => updateTaskTitle(editingTask.id, editingTask.title),
                          style: { width: '100%', fontSize: 14, border: '1px solid #0d9488', borderRadius: 6, padding: '4px 8px', outline: 'none', color: '#1f2937', background: '#f0fdfa', boxSizing: 'border-box' }
                        })
                      : h('div', {
                          style: { ...S.taskTitle, ...(t.done ? S.taskTitleDone : {}), cursor: t.done ? 'default' : 'text' },
                          onClick: () => { if (!t.done) setEditingTask({ id: t.id, title: t.title }); }
                        }, t.title),
                    t.done && t.doneReason && h('div', { style: S.taskReason }, `✓ ${t.doneReason}`),
                    h('div', { style: S.taskMeta }, t.done ? `完成於 ${fmt(t.doneAt)}` : `建立於 ${fmt(t.created)}`)
                  ),
                  h('span', { onClick: () => toggleTaskPin(t.id, t.pinned),
                    title: t.pinned ? '取消釘選' : '釘選',
                    style: { cursor: 'pointer', fontSize: 11, opacity: t.pinned ? 1 : 0.2, color: '#0d9488', flexShrink: 0 } }, '📌'),
                  h('label', { style: { ...S.imgActBtn, cursor: 'pointer', flexShrink: 0, margin: 0 }, title: '加照片' },
                    '📷',
                    h('input', { type: 'file', accept: 'image/*', multiple: true, onChange: (e) => onPickTaskImage(t.id, e), style: { display: 'none' } })
                  ),
                  confirmDel?.type === 'task' && confirmDel.id === t.id
                    ? h('span', { style: { display: 'flex', gap: 4, flexShrink: 0 } },
                        h('span', { style: { color: '#ef4444', cursor: 'pointer' }, onClick: () => trashTask(t.id) }, '✓'),
                        h('span', { style: { color: '#9ca3af', cursor: 'pointer' }, onClick: () => setConfirmDel(null) }, '✕'))
                    : h('span', { style: { color: '#cbd5e1', cursor: 'pointer', flexShrink: 0 }, onClick: () => setConfirmDel({ type: 'task', id: t.id }) }, '🗑')
                ),
                (t.images?.length > 0) && h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 8, marginTop: 10 } },
                  ...t.images.map((im, i) =>
                    h(ImageCard, { key: im.id, image: im, index: i,
                      onView: () => setLightbox(im),
                      onAnnotate: () => setAnnotating({ type: 'task', id: t.id, imgIndex: i }),
                      onDelete: () => setConfirmDel({ type: 'taskImage', taskId: t.id, id: i }),
                      confirmingDelete: confirmDel?.type === 'taskImage' && confirmDel.taskId === t.id && confirmDel.id === i,
                      onConfirmDelete: () => delTaskImage(t.id, i),
                      onRotateLeft: () => rotateTaskImage(t.id, i, 270),
                      onRotateRight: () => rotateTaskImage(t.id, i, 90),
                    })
                  )
                )
              )
            ))
        )
      )
    ),

    // 渲染筆記編輯器 (Editor Column)
    h('main', { className: mobileView === 'editor' ? 'mobile-full-width' : 'hide-on-mobile', style: S.editorCol, ...swipeHandlers('editor') },
      !activeProject
        ? h('div', { style: { ...S.placeholder, position: 'relative' } }, 
            h('div', { style: { fontSize: 48 } }, '📁'), h('p', null, '選擇或新增一個專案開始記錄')
          )
        : tab === 'tasks'
        ? h('div', { style: { ...S.placeholder, position: 'relative' } },
            h('button', { className: 'mobile-only', onClick: () => setMobileView('list'), style: { position: 'absolute', top: 20, left: 20, background: 'none', border: 'none', fontSize: 32, padding: '0 10px', cursor: 'pointer', color: '#64748b' } }, '‹'),
            h('div', { style: { fontSize: 48 } }, '✓'),
            h('p', null, '從左側點開筆記才能加照片喔！'),
            h('p', { style: { fontSize: 12, color: '#cbd5e1', marginTop: -8 } }, '任務是代辦事項，不提供照片功能'))
        : !activeNote
        ? h('div', { style: { ...S.placeholder, position: 'relative' } },
            h('button', { className: 'mobile-only', onClick: () => setMobileView('list'), style: { position: 'absolute', top: 20, left: 20, background: 'none', border: 'none', fontSize: 32, padding: '0 10px', cursor: 'pointer', color: '#64748b' } }, '‹'),
            h('div', { style: { fontSize: 48 } }, '📝'), h('p', null, '選擇左側筆記，或建立新筆記'))
        : h('div', { style: S.editor },
            // 👇 這是優化防擠壓，且使用原生 Label 的工具列
            h('div', { style: { display: 'flex', flexDirection: 'column', gap: 12, paddingBottom: 16, marginBottom: 12, borderBottom: '1px solid #f1f5f9' } },
              h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, width: '100%' } },
                h('button', { className: 'mobile-only', onClick: () => setMobileView('list'), style: { background: 'none', border: 'none', fontSize: 28, padding: '0 8px 0 0', cursor: 'pointer', color: '#64748b' } }, '‹'),
                h('input', { value: activeNote.title || '', onChange: (e) => updateNoteFields({ title: e.target.value }), placeholder: '筆記標題', style: { ...S.titleInput, width: '100%', minWidth: 0 } })
              ),
              h('div', { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
                h('button', { onClick: manualSaveNote, style: { ...S.primaryBtnSm, background: '#3b82f6' } }, '💾 儲存'),
                h('button', { onClick: undoBodyEdit, disabled: !canBodyUndo, title: '上一步 (Ctrl+Z)', style: { ...S.ghostBtn, opacity: canBodyUndo ? 1 : 0.35, cursor: canBodyUndo ? 'pointer' : 'default' } }, '↩ 上一步'),
                
                // 👇 使用 HTML 原生 <label> 解決手機瀏覽器阻擋相簿的問題
                h('label', { style: { ...S.ghostBtn, opacity: uploading ? 0.5 : 1, pointerEvents: uploading ? 'none' : 'auto', margin: 0 } },
                  uploading ? '處理中…' : '📷 加照片',
                  h('input', { type: 'file', accept: 'image/*', multiple: true, onChange: onPickImage, style: { display: 'none' } })
                ),

                confirmDel?.type === "note" && confirmDel.id === activeNote.id
                  ? h('span', { style: { display: 'flex', gap: 8 } },
                      h('button', { onClick: () => trashNote(activeNote.id), style: S.dangerBtn }, '確定刪除'),
                      h('button', { onClick: () => setConfirmDel(null), style: S.ghostBtn }, '✕'))
                  : h('button', { onClick: () => setConfirmDel({ type: "note", id: activeNote.id }), style: S.dangerBtn }, '🗑')
              )
            ),
            h('div', { style: S.editorDate },
              h('span', { style: { color: saveStatus === 'unsaved' ? '#f59e0b' : saveStatus === 'saving' ? '#64748b' : '#9ca3af' } },
                saveStatus === 'unsaved' ? '● 未儲存（停止輸入 2 秒後自動存）' :
                saveStatus === 'saving'  ? '儲存中…' :
                saveStatus === 'saved'   ? ('✓ 已自動儲存　' + fmt(activeNote.updated)) :
                ('最後編輯 ' + fmt(activeNote.updated))
              ),
              h('span', { style: { ...S.sizeBar, ...(sizePct > 85 ? S.sizeBarFull : {}) } },
                `${(noteSize / 1024).toFixed(0)} KB / 1 MB (${sizePct}%)`)
            ),
            h('div', { style: { position: 'relative' } },
              h('button', {
                onClick: () => setBodyExpanded(b => !b),
                title: bodyExpanded ? '縮小' : '放大文字欄',
                style: { position: 'absolute', top: 8, right: 8, background: 'transparent', border: 'none', cursor: 'pointer', color: '#94a3b8', fontSize: 16, zIndex: 1, lineHeight: 1 }
              }, bodyExpanded ? '⊡' : '⊞'),
              h('textarea', { value: activeNote.body || '',
                onChange: (e) => {
                  const now = Date.now();
                  if (now - bodyUndoLastPush.current > 800) {
                    const cur = activeNote.body || '';
                    bodyUndoStack.current = [...bodyUndoStack.current, cur].slice(-50);
                    bodyUndoLastPush.current = now;
                    setCanBodyUndo(true);
                  }
                  updateNoteFields({ body: e.target.value });
                },
                onKeyDown: (e) => {
                  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                    e.preventDefault(); undoBodyEdit();
                  }
                },
                placeholder: '在這裡寫工作記事…　拍照或匯入照片後，點照片即可在上面畫圖、標註。',
                style: { ...S.bodyArea, minHeight: bodyExpanded ? 'calc(100vh - 290px)' : 180 } })
            ),
            (activeNote.images?.length > 0) && h('div', { style: S.imgGrid },
              ...activeNote.images.map((im, i) =>
                h(ImageCard, { key: im.id, image: im, index: i,
                  onView: () => setLightbox(im),
                  onAnnotate: () => setAnnotating({ type: 'note', imgIndex: i }),
                  onDelete: () => setConfirmDel({ type: "image", id: i }),
                  confirmingDelete: confirmDel?.type === "image" && confirmDel.id === i,
                  onConfirmDelete: () => delImage(i),
                  onRotateLeft: () => rotateImage(i, 270),
                  onRotateRight: () => rotateImage(i, 90),
                })))
          )
    ),

    annotating && (() => {
      const im = annotating.type === 'task'
        ? tasks.find(t => t.id === annotating.id)?.images[annotating.imgIndex]
        : activeNote?.images[annotating.imgIndex];
      return im ? h(PhotoAnnotator, {
        src: im.dataUrl, initialStrokes: im.strokes || [], initialGrayscale: !!im.grayscale,
        onSave: saveAnnotation, onClose: () => setAnnotating(null)
      }) : null;
    })(),
    lightbox && h(Lightbox, { image: lightbox, onClose: () => setLightbox(null) }),
    newTaskModal && h(TextModal, {
      title: '新增任務', placeholder: '要做什麼？例如：寄出申請書',
      confirmText: '建立', onConfirm: addTask, onCancel: () => setNewTaskModal(false)
    }),
    completeTaskId && h(TextModal, {
      title: '完成任務', subtitle: '記錄一下完成的方式或結果，之後可以回顧。',
      placeholder: '例如：已親送至客戶辦公室、編號 A-23',
      multiline: true, confirmText: '完成',
      onConfirm: completeTask, onCancel: () => setCompleteTaskId(null)
    })
  );
}

createRoot(document.getElementById('root')).render(h(App));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
