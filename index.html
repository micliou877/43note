};

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement('img');
      img.onload = () => {
        const scale = Math.min(1, MAX_IMG_WIDTH / img.width);
        const w = Math.round(img.width * scale);
        const hh = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = hh;
        canvas.getContext('2d').drawImage(img, 0, 0, w, hh);
        let q = JPG_QUALITY;
        let dataUrl;
        do {
          dataUrl = canvas.toDataURL('image/jpeg', q);
          q = Math.round((q - 0.1) * 10) / 10;
        } while (dataUrl.length > 600000 && q >= 0.2);
        resolve(dataUrl);
      };
      img.onerror = () => reject(new Error('圖片解析失敗'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function rotateImageData(dataUrl, deg) {
  return new Promise((resolve, reject) => {
    const img = document.createElement('img');
    img.onload = () => {
      const swap = deg === 90 || deg === 270;
      const canvas = document.createElement('canvas');
      canvas.width = swap ? img.height : img.width;
      canvas.height = swap ? img.width : img.height;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate((deg * Math.PI) / 180);
      ctx.drawImage(img, -img.width / 2, -img.height / 2);
      resolve(canvas.toDataURL('image/jpeg', JPG_QUALITY));
    };
    img.onerror = () => reject(new Error('旋轉失敗'));
    img.src = dataUrl;
  });
}

function toBodyHtml(body) {
  if (!body) return '';
  if (/<(br|p|div|b|i|u|s|span|ul|ol|li|strong|em|blockquote)\b/i.test(body)) return body;
  return body
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]*>/g, '')
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&nbsp;/g, ' ').trim();
}

function estimateNoteSize(note) {
  let bytes = (note.title?.length || 0) + (note.body?.length || 0);
  for (const im of (note.images || [])) {
    bytes += (im.dataUrl?.length || 0);
    bytes += JSON.stringify(im.strokes || []).length;
  }
  return bytes;
}

function CalendarView({ tasks, selectedDate, onSelectDate }) {
  const today = new Date();
  const [viewYear, setViewYear] = useState(selectedDate ? selectedDate.getFullYear() : today.getFullYear());
  const [viewMonth, setViewMonth] = useState(selectedDate ? selectedDate.getMonth() : today.getMonth());

  useEffect(() => {
    if (selectedDate) { setViewYear(selectedDate.getFullYear()); setViewMonth(selectedDate.getMonth()); }
  }, [selectedDate]);

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();

  const tasksByDate = {};
  tasks.forEach(t => {
    if (!t.dueDate || t.deleted) return;
    const d = new Date(t.dueDate);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!tasksByDate[key]) tasksByDate[key] = [];
    tasksByDate[key].push(t);
  });

  const prevM = () => { if (viewMonth === 0) { setViewYear(y => y-1); setViewMonth(11); } else setViewMonth(m => m-1); };
  const nextM = () => { if (viewMonth === 11) { setViewYear(y => y+1); setViewMonth(0); } else setViewMonth(m => m+1); };

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return h('div', { style: { padding: '10px 12px' } },
    h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 } },
      h('button', { onClick: prevM, style: S.miniBtn }, '‹'),
      h('span', { style: { fontWeight: 700, fontSize: 14 } }, `${viewYear} 年 ${viewMonth + 1} 月`),
      h('button', { onClick: nextM, style: S.miniBtn }, '›')
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 1, marginBottom: 2 } },
      ...['日','一','二','三','四','五','六'].map(d =>
        h('div', { key: d, style: { textAlign: 'center', fontSize: 10, color: '#94a3b8', padding: '3px 0' } }, d))
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 1 } },
      ...cells.map((day, i) => {
        if (!day) return h('div', { key: `e${i}` });
        const key = `${viewYear}-${viewMonth}-${day}`;
        const dayTasks = tasksByDate[key] || [];
        const pending = dayTasks.filter(t => !t.done);
        const done = dayTasks.filter(t => t.done);
        const isToday = day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
        const isSel = selectedDate && day === selectedDate.getDate() && viewMonth === selectedDate.getMonth() && viewYear === selectedDate.getFullYear();
        const isOverdue = pending.some(t => new Date(t.dueDate) < today);
        return h('div', { key: day, onClick: () => onSelectDate(new Date(viewYear, viewMonth, day)),
          style: { textAlign: 'center', padding: '4px 1px', borderRadius: 6, cursor: 'pointer', minHeight: 36,
            background: isSel ? '#0d9488' : isToday ? '#f0fdfa' : 'transparent',
            border: isToday && !isSel ? '1px solid #0d9488' : '1px solid transparent',
            color: isSel ? '#fff' : '#1f2937' } },
          h('div', { style: { fontSize: 12 } }, day),
          dayTasks.length > 0 && h('div', { style: { display: 'flex', justifyContent: 'center', gap: 2, marginTop: 1 } },
            pending.length > 0 && h('span', { style: { width: 5, height: 5, borderRadius: '50%', display: 'inline-block',
              background: isOverdue ? '#ef4444' : (isSel ? '#fff' : '#0d9488') } }),
            done.length > 0 && h('span', { style: { width: 5, height: 5, borderRadius: '50%', display: 'inline-block',
              background: isSel ? 'rgba(255,255,255,0.5)' : '#cbd5e1' } })
          )
        );
      })
    )
  );
}

function renderStrokesScaled(ctx, strokes, ratio) {
  for (const s of (strokes || [])) {
    if (!s || !s.color) continue;
    ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
    ctx.lineWidth = s.width * ratio; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (s.type === 'pen') {
      ctx.beginPath();
      s.points.forEach((p, i) => (i ? ctx.lineTo(p.x * ratio, p.y * ratio) : ctx.moveTo(p.x * ratio, p.y * ratio)));
      ctx.stroke();
    } else if (s.type === 'rect') {
      ctx.strokeRect(s.x0 * ratio, s.y0 * ratio, (s.x1 - s.x0) * ratio, (s.y1 - s.y0) * ratio);
    } else if (s.type === 'arrow') {
      const x0 = s.x0*ratio, y0 = s.y0*ratio, x1 = s.x1*ratio, y1 = s.y1*ratio;
      const head = (10 + s.width * 2) * ratio;
      const ang = Math.atan2(y1 - y0, x1 - x0);
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - head * Math.cos(ang - Math.PI/6), y1 - head * Math.sin(ang - Math.PI/6));
      ctx.lineTo(x1 - head * Math.cos(ang + Math.PI/6), y1 - head * Math.sin(ang + Math.PI/6));
      ctx.closePath(); ctx.fill();
    } else if (s.type === 'ellipse') {
      const rx = Math.abs(s.x1 - s.x0) / 2 * ratio, ry = Math.abs(s.y1 - s.y0) / 2 * ratio;
      if (rx > 0.5 && ry > 0.5) { ctx.beginPath(); ctx.ellipse((s.x0+s.x1)/2*ratio, (s.y0+s.y1)/2*ratio, rx, ry, 0, 0, Math.PI*2); ctx.stroke(); }
    } else if (s.type === 'line') {
      ctx.beginPath(); ctx.moveTo(s.x0*ratio, s.y0*ratio); ctx.lineTo(s.x1*ratio, s.y1*ratio); ctx.stroke();
    } else if (s.type === 'highlight') {
      ctx.save(); ctx.globalAlpha = 0.38; ctx.fillStyle = s.color;
      ctx.fillRect(Math.min(s.x0,s.x1)*ratio, Math.min(s.y0,s.y1)*ratio, Math.abs(s.x1-s.x0)*ratio, Math.abs(s.y1-s.y0)*ratio);
      ctx.restore();
    } else if (s.type === 'text') {
      ctx.font = `${s.size * ratio}px -apple-system,"PingFang TC",sans-serif`;
      ctx.textBaseline = 'top';
      ctx.fillText(s.text, s.x * ratio, s.y * ratio);
    }
  }
}

function renderImageToDataUrl(im) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1200;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      if (im.grayscale) {
        ctx.filter = 'grayscale(100%)';
        ctx.drawImage(img, 0, 0, w, h);
        ctx.filter = 'none';
      } else {
        ctx.drawImage(img, 0, 0, w, h);
      }
      if (im.strokes?.length) {
        const annotatorScale = Math.min(1, 1400 / img.width);
        const ratio = w / (img.width * annotatorScale);
        renderStrokesScaled(ctx, im.strokes, ratio);
      }
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = im.dataUrl;
  });
}

function PhotoAnnotator({ src, initialStrokes, initialGrayscale, onSave, onClose }) {
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const [tool, setTool] = useState("pen");
  const [color, setColor] = useState("#ef4444");
  const [width, setWidth] = useState(4);
  const [strokes, setStrokes] = useState((initialStrokes || []).filter(Boolean));
  const [grayscale, setGrayscale] = useState(!!initialGrayscale);
  const drawingRef = useRef(false);
  const cur = useRef(null);
  const grayCanvasRef = useRef(null);
  const canvasWrapRef = useRef(null);
  const panStart = useRef(null);
  const [textInput, setTextInput] = useState(null);
  const [imgDims, setImgDims] = useState({ w: 0, h: 0 });
  const [zoom, setZoom] = useState(1);

  useEffect(() => {
    const img = document.createElement("img");
    img.onload = () => {
      const maxW = 1400;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      setImgDims({ w, h });
      imgRef.current = img;
      const gc = document.createElement('canvas');
      gc.width = w; gc.height = h;
      const gctx = gc.getContext('2d');
      gctx.drawImage(img, 0, 0, w, h);
      const id = gctx.getImageData(0, 0, w, h);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.round(0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]);
        d[i] = d[i+1] = d[i+2] = v;
      }
      gctx.putImageData(id, 0, 0);
      grayCanvasRef.current = gc;
    };
    img.src = src;
  }, [src]);

  const drawStroke = (ctx, s) => {
    if (!s || !s.color) return;
    ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
    ctx.lineWidth = s.width; ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (s.type === "pen") {
      ctx.beginPath();
      s.points.forEach((p, i) => (i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)));
      ctx.stroke();
    } else if (s.type === "rect") {
      ctx.strokeRect(s.x0, s.y0, s.x1 - s.x0, s.y1 - s.y0);
    } else if (s.type === "arrow") {
      const head = 10 + s.width * 2;
      const ang = Math.atan2(s.y1 - s.y0, s.x1 - s.x0);
      ctx.beginPath(); ctx.moveTo(s.x0, s.y0); ctx.lineTo(s.x1, s.y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x1 - head * Math.cos(ang - Math.PI / 6), s.y1 - head * Math.sin(ang - Math.PI / 6));
      ctx.lineTo(s.x1 - head * Math.cos(ang + Math.PI / 6), s.y1 - head * Math.sin(ang + Math.PI / 6));
      ctx.closePath(); ctx.fill();
    } else if (s.type === "ellipse") {
      const rx = Math.abs(s.x1 - s.x0) / 2, ry = Math.abs(s.y1 - s.y0) / 2;
      if (rx > 0.5 && ry > 0.5) { ctx.beginPath(); ctx.ellipse((s.x0+s.x1)/2, (s.y0+s.y1)/2, rx, ry, 0, 0, Math.PI*2); ctx.stroke(); }
    } else if (s.type === "line") {
      ctx.beginPath(); ctx.moveTo(s.x0, s.y0); ctx.lineTo(s.x1, s.y1); ctx.stroke();
    } else if (s.type === "highlight") {
      ctx.save(); ctx.globalAlpha = 0.38; ctx.fillStyle = s.color;
      ctx.fillRect(Math.min(s.x0,s.x1), Math.min(s.y0,s.y1), Math.abs(s.x1-s.x0), Math.abs(s.y1-s.y0));
      ctx.restore();
    } else if (s.type === "text") {
      ctx.font = `${s.size}px -apple-system, "PingFang TC", sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillText(s.text, s.x, s.y);
    }
  };

  const redraw = useCallback(() => {
    const c = canvasRef.current;
    if (!c || !imgRef.current) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    const base = (grayscale && grayCanvasRef.current) ? grayCanvasRef.current : imgRef.current;
    ctx.drawImage(base, 0, 0, c.width, c.height);
    const all = cur.current ? [...strokes, cur.current] : strokes;
    for (const s of all) drawStroke(ctx, s);
  }, [strokes, grayscale]);

  useEffect(() => { redraw(); }, [redraw, imgDims]);

  const pos = (e) => {
    const r = canvasRef.current.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - r.left) * (canvasRef.current.width / r.width),
      y: (t.clientY - r.top) * (canvasRef.current.height / r.height),
    };
  };

  const nearStroke = (s, p) => {
    if (!s) return false;
    const d = 12;
    if (s.type === "pen") return s.points.some((pt) => Math.hypot(pt.x - p.x, pt.y - p.y) < d);
    if (s.type === "text") return Math.abs(p.x - s.x) < 120 && Math.abs(p.y - s.y) < s.size + 6;
    const minX = Math.min(s.x0, s.x1) - d, maxX = Math.max(s.x0, s.x1) + d;
    const minY = Math.min(s.y0, s.y1) - d, maxY = Math.max(s.y0, s.y1) + d;
    return p.x > minX && p.x < maxX && p.y > minY && p.y < maxY;
  };

  const eraseAt = (p) => {
    setStrokes((curr) => {
      const hit = [...curr].reverse().find((s) => nearStroke(s, p));
      return hit ? curr.filter((s) => s.id !== hit.id) : curr;
    });
  };

  const start = (e) => {
    e.preventDefault();
    if (e.touches?.length >= 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      panStart.current = {
        midX: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        midY: (e.touches[0].clientY + e.touches[1].clientY) / 2,
        scrollLeft: canvasWrapRef.current?.scrollLeft || 0,
        scrollTop: canvasWrapRef.current?.scrollTop || 0,
        dist,
        initZoom: zoom,
      };
      return;
    }
    panStart.current = null;
    const p = pos(e);
    if (tool === "text") { setTextInput({ x: p.x, y: p.y, value: "" }); return; }
    if (tool === "erase") { drawingRef.current = true; eraseAt(p); return; }
    drawingRef.current = true;
    if (tool === "pen") cur.current = { id: uid(), type: "pen", color, width, points: [p] };
    else cur.current = { id: uid(), type: tool, color, width, x0: p.x, y0: p.y, x1: p.x, y1: p.y };
  };

  const move = (e) => {
    e.preventDefault();
    if (panStart.current && e.touches?.length >= 2) {
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (canvasWrapRef.current) {
        canvasWrapRef.current.scrollLeft = panStart.current.scrollLeft - (midX - panStart.current.midX);
        canvasWrapRef.current.scrollTop = panStart.current.scrollTop - (midY - panStart.current.midY);
      }
      const newZoom = Math.max(1, Math.min(4, panStart.current.initZoom * (dist / panStart.current.dist)));
      setZoom(+(newZoom.toFixed(2)));
      return;
    }
    if (!drawingRef.current) return;
    const p = pos(e);
    if (tool === "erase") { eraseAt(p); return; }
    if (!cur.current) return;
    if (tool === "pen") cur.current.points.push(p);
    else { cur.current.x1 = p.x; cur.current.y1 = p.y; }
    redraw();
  };

  const end = () => {
    panStart.current = null;
    if (!drawingRef.current) return;
    drawingRef.current = false;
    if (tool === "erase") return;
    const finished = cur.current;
    cur.current = null;
    if (finished) setStrokes((s) => [...s, finished]);
  };

  const commitText = () => {
    if (textInput && textInput.value.trim()) {
      setStrokes((s) => [...s, {
        id: uid(), type: "text", color, text: textInput.value,
        x: textInput.x, y: textInput.y, size: Math.max(18, width * 6),

    setTextInput(null);

function Lightbox({ image, onClose }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [zoom, setZoom] = useState(1);
  const [baseDims, setBaseDims] = useState({ w: 0, h: 0 });
  const pinchDist = useRef(null);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  useEffect(() => {
    const img = document.createElement('img');
    img.onload = () => {
      const c = canvasRef.current; if (!c) return;
      const maxW = window.innerWidth * 0.92;
      const maxH = window.innerHeight * 0.80;
      const scale = Math.min(1, maxW / img.width, maxH / img.height);
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      setBaseDims({ w: c.width, h: c.height });
      const ctx = c.getContext('2d');
      if (image.grayscale) ctx.filter = 'grayscale(100%)';
      ctx.drawImage(img, 0, 0, c.width, c.height);
      ctx.filter = 'none';
      const annotatorScale = Math.min(1, 1400 / img.width);
      const ratio = c.width / (img.width * annotatorScale);
      for (const s of (image.strokes || [])) {
        if (!s || !s.color) continue;
        ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
        ctx.lineWidth = s.width * ratio; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (s.type === 'pen') {
          ctx.beginPath();
          s.points.forEach((p, i) => (i ? ctx.lineTo(p.x * ratio, p.y * ratio) : ctx.moveTo(p.x * ratio, p.y * ratio)));
          ctx.stroke();
        } else if (s.type === 'rect') {
          ctx.strokeRect(s.x0 * ratio, s.y0 * ratio, (s.x1 - s.x0) * ratio, (s.y1 - s.y0) * ratio);
        } else if (s.type === 'arrow') {
          const x0 = s.x0 * ratio, y0 = s.y0 * ratio, x1 = s.x1 * ratio, y1 = s.y1 * ratio;
          const head = (10 + s.width * 2) * ratio;
          const ang = Math.atan2(y1 - y0, x1 - x0);
          ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x1, y1);
          ctx.lineTo(x1 - head * Math.cos(ang - Math.PI / 6), y1 - head * Math.sin(ang - Math.PI / 6));
          ctx.lineTo(x1 - head * Math.cos(ang + Math.PI / 6), y1 - head * Math.sin(ang + Math.PI / 6));
          ctx.closePath(); ctx.fill();
        } else if (s.type === 'ellipse') {
          const rx = Math.abs(s.x1 - s.x0) / 2 * ratio, ry = Math.abs(s.y1 - s.y0) / 2 * ratio;
          if (rx > 0.5 && ry > 0.5) { ctx.beginPath(); ctx.ellipse((s.x0+s.x1)/2*ratio, (s.y0+s.y1)/2*ratio, rx, ry, 0, 0, Math.PI*2); ctx.stroke(); }
        } else if (s.type === 'line') {
          ctx.beginPath(); ctx.moveTo(s.x0*ratio, s.y0*ratio); ctx.lineTo(s.x1*ratio, s.y1*ratio); ctx.stroke();
        } else if (s.type === 'highlight') {
          ctx.save(); ctx.globalAlpha = 0.38; ctx.fillStyle = s.color;
          ctx.fillRect(Math.min(s.x0,s.x1)*ratio, Math.min(s.y0,s.y1)*ratio, Math.abs(s.x1-s.x0)*ratio, Math.abs(s.y1-s.y0)*ratio);
          ctx.restore();
        } else if (s.type === 'text') {
          ctx.font = `${s.size * ratio}px -apple-system, "PingFang TC", sans-serif`;
          ctx.textBaseline = 'top';
          ctx.fillText(s.text, s.x * ratio, s.y * ratio);
        }
      }
    };
    img.src = image.dataUrl;
  }, [image]);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onWheel = (e) => {
      e.preventDefault();
      setZoom(z => Math.max(0.3, Math.min(6, z + (e.deltaY < 0 ? 0.15 : -0.15))));
    };
    const onTouchMove = (e) => {
      if (e.touches.length === 2 && pinchDist.current !== null) {
        e.preventDefault();
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        setZoom(z => Math.max(0.3, Math.min(6, z * (dist / pinchDist.current))));
        pinchDist.current = dist;
      }
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    el.addEventListener('touchmove', onTouchMove, { passive: false });
    return () => { el.removeEventListener('wheel', onWheel); el.removeEventListener('touchmove', onTouchMove); };
  }, []);

  const changeZoom = (delta) => setZoom(z => Math.max(0.3, Math.min(6, z + delta)));
  const btnStyle = { background: 'rgba(255,255,255,.2)', color: '#fff', border: 'none', borderRadius: 8, padding: '7px 14px', cursor: 'pointer', fontSize: 15, fontWeight: 600 };

  return h('div', {
    style: { ...S.modalOverlay, cursor: 'default', alignItems: 'flex-start', paddingTop: 20 },
    onClick: (e) => e.target === e.currentTarget && onClose()
  },
    h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%', maxWidth: '98vw', margin: '0 auto' } },
      h('div', { style: { display: 'flex', gap: 8, marginBottom: 12, alignItems: 'center', flexWrap: 'wrap', justifyContent: 'center' } },
        h('button', { onClick: () => changeZoom(-0.25), style: btnStyle }, '−'),
        h('span', { style: { color: '#fff', fontSize: 13, minWidth: 46, textAlign: 'center', lineHeight: '34px', userSelect: 'none' } }, `${Math.round(zoom * 100)}%`),
        h('button', { onClick: () => changeZoom(0.25), style: btnStyle }, '+'),
        h('button', { onClick: () => setZoom(1), style: { ...btnStyle, fontSize: 12, padding: '7px 10px', opacity: 0.75 } }, '重置'),
        h('button', { onClick: onClose, style: btnStyle }, '✕ 關閉')
      ),
      h('div', {
        ref: containerRef,
        style: { overflow: 'auto', maxWidth: '95vw', maxHeight: '80vh', borderRadius: 10 },
        onTouchStart: (e) => {
          if (e.touches.length === 2) {
            pinchDist.current = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
          }
        },
        onTouchEnd: () => { pinchDist.current = null; },
      },
        h('canvas', { ref: canvasRef, style: {
          display: 'block', borderRadius: 10,
          width: baseDims.w * zoom || undefined,
          height: baseDims.h * zoom || undefined,
          cursor: zoom > 1 ? 'grab' : 'zoom-in'
        } })
      ),
      h('div', { style: { color: 'rgba(255,255,255,0.35)', fontSize: 11, marginTop: 8, textAlign: 'center' } }, '滾輪縮放　手機雙指捏合放大')
    )
  );
}

function ProjectItem({ project, isActive, hasOverdue, onClick, onRename, onDelete, confirmingDelete, onConfirmDelete, onCancelDelete, onTogglePin, onSetFolder, dragHandlers }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(project.name);

  const overdueStyle = hasOverdue
    ? { background: isActive ? '#fb7185' : '#fecdd3', color: '#0f172a' }
    : isActive ? S.projItemActive : {};

  if (editing) {
    const submit = () => {
      const trimmed = val.trim();
      if (trimmed && trimmed !== project.name) onRename(trimmed);
      setEditing(false);
    };
    return h('div', { style: { ...S.projItem, ...overdueStyle } },
      h('span', null, '📋'),
      h('input', {
        autoFocus: true, value: val,
        onChange: (e) => setVal(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') { setVal(project.name); setEditing(false); } },

  return h('div', { onClick, ...dragHandlers, style: { ...S.projItem, ...overdueStyle, cursor: 'default' } },

      ? h('span', { style: { display: "flex", gap: 8 } },

  const exportToWord = async () => {
    const title = activeNote?.title || '未命名筆記';

    const dataUrlToUint8 = (dataUrl) => {
      const raw = atob(dataUrl.split(',')[1]);
      const arr = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    };

    const getImgSize = (dataUrl) => new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const MAX_W = 540;
        const r = (img.naturalHeight || 300) / (img.naturalWidth || 400);
        const w = Math.min(MAX_W, img.naturalWidth || MAX_W);
        res({ width: Math.round(w), height: Math.round(w * r) });
      };
      img.onerror = () => res({ width: 400, height: 300 });
      img.src = dataUrl;
    });

    const getImgType = (dataUrl) => {
      const m = dataUrl.match(/^data:image\/([^;]+);/);
      const t = m ? m[1] : 'jpeg';
      if (t === 'png') return 'png';
      if (t === 'gif') return 'gif';
      if (t === 'bmp') return 'bmp';
      return 'jpg';
    };

    const makeImgPara = async (dataUrl) => {
      const size = await getImgSize(dataUrl);
      return new Paragraph({
        children: [new ImageRun({ data: dataUrlToUint8(dataUrl), transformation: size, type: getImgType(dataUrl) })]
      });
    };

    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = activeNote?.body || '';
    const paras = [];

    paras.push(new Paragraph({ text: title, heading: HeadingLevel.HEADING_1 }));

    const processNode = async (node) => {
      if (node.nodeType === Node.TEXT_NODE) {
        const t = node.textContent;
        if (t.trim()) paras.push(new Paragraph({ children: [new TextRun(t)] }));
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      const tag = node.tagName.toLowerCase();

      if (tag === 'img') {
        const src = node.getAttribute('src') || '';
        if (src.startsWith('data:')) paras.push(await makeImgPara(src));
        return;
      }
      if (tag === 'br') { paras.push(new Paragraph({})); return; }

      const hasImg = Array.from(node.childNodes).some(n => n.nodeName === 'IMG');
      if (hasImg) {
        for (const child of Array.from(node.childNodes)) await processNode(child);
        return;
      }

      const text = node.textContent || '';
      if (!text.trim()) return;

      if (/^h[1-6]$/.test(tag)) {
        const lvls = [HeadingLevel.HEADING_1, HeadingLevel.HEADING_2, HeadingLevel.HEADING_3, HeadingLevel.HEADING_4, HeadingLevel.HEADING_5, HeadingLevel.HEADING_6];
        paras.push(new Paragraph({ text, heading: lvls[parseInt(tag[1]) - 1] }));
      } else if (tag === 'blockquote') {
        paras.push(new Paragraph({ text, indent: { left: 720 } }));
      } else if (node.classList?.contains('li3')) {
        paras.push(new Paragraph({ text: '    ▪ ' + text, indent: { left: 720 } }));
      } else if (node.classList?.contains('li2')) {
        paras.push(new Paragraph({ text: '  ◦ ' + text, indent: { left: 360 } }));
      } else if (node.classList?.contains('li1')) {
        paras.push(new Paragraph({ text: '• ' + text }));
      } else {
        paras.push(new Paragraph({ text }));
      }
    };

    for (const node of Array.from(tempDiv.childNodes)) await processNode(node);

    for (const im of noteImages) {
      if (im.dataUrl?.startsWith('data:')) paras.push(await makeImgPara(im.dataUrl));
    }

    const docFile = new Document({ sections: [{ properties: {}, children: paras }] });
    const blob = await Packer.toBlob(docFile);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${title}.docx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

        const isList = ['li1','li2','li3'].some(c => n.className?.split(' ').includes(c));

  const onPickImage = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length || !activeNote) return;
    setUploading(true);
    try {
      for (const f of files) {
        const dataUrl = await compressImage(f);
        await addDoc(imgCol(), { dataUrl, strokes: [], grayscale: false, sortOrder: Date.now(), created: serverTimestamp() });
      }
      const newCount = noteImages.length + files.length;
      await updateDoc(doc(db, `users/${user.uid}/notes/${activeNote.id}`), { imageCount: newCount, updated: serverTimestamp() });
      updateNoteFields({ imageCount: newCount });
    } catch (err) { alert('加入照片失敗：' + err.message); }
    finally { setUploading(false); }
  };
  const saveAnnotation = async ({ strokes, grayscale, dataUrl }) => {
    if (annotating.type === 'inline') {
      const img = bodyRef.current?.querySelector(`img[data-inline="${annotating.imgId}"]`);
      if (img && dataUrl) {
        if (!img.dataset.original) img.dataset.original = img.src;
        img.src = dataUrl;
        img.dataset.strokes = JSON.stringify(strokes || []);
        updateNoteFields({ body: bodyRef.current.innerHTML });
      }
    } else if (annotating.type === 'task') {
      const task = tasks.find(t => t.id === annotating.id);
      const imgs = task.images.map((im, i) => i === annotating.imgIndex ? { ...im, strokes, grayscale } : im);
      await updateDoc(doc(db, `users/${user.uid}/tasks/${annotating.id}`), { images: imgs });
    } else {
      const img = noteImages[annotating.imgIndex];
      if (img) await updateDoc(imgDoc(img.id), { strokes, grayscale });
    }
    setAnnotating(null);
  };
  const selectInlineImg = (imgEl) => {
    document.querySelectorAll('.note-body img.img-sel').forEach(el => el.classList.remove('img-sel'));
    imgEl.classList.add('img-sel');
    setSelImg({ imgId: imgEl.dataset.inline, src: imgEl.src, rect: imgEl.getBoundingClientRect() });
  };
  const clearSelImg = () => {
    document.querySelectorAll('.note-body img.img-sel').forEach(el => el.classList.remove('img-sel'));
    setSelImg(null);
  };
  const deleteInlineImg = (imgId) => {
    const img = bodyRef.current?.querySelector(`img[data-inline="${imgId}"]`);
    if (img) { img.remove(); updateNoteFields({ body: bodyRef.current.innerHTML }); }
  };
  const startImgResize = (e) => {
    e.preventDefault(); e.stopPropagation();
    const img = bodyRef.current?.querySelector(`img[data-inline="${selImg?.imgId}"]`);
    if (!img) return;
    const startX = e.clientX, startW = img.getBoundingClientRect().width;
    const onMove = (e) => { img.style.width = Math.max(60, startW + e.clientX - startX) + 'px'; };
    const onUp = () => {
      updateNoteFields({ body: bodyRef.current.innerHTML });
      setSelImg(s => s ? { ...s, rect: img.getBoundingClientRect() } : s);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
    };
    document.body.style.cursor = 'se-resize';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
  const delImage = async (imgId) => {
    await deleteDoc(imgDoc(imgId));
    const newCount = Math.max(0, (activeNote.imageCount || noteImages.length) - 1);
    await updateDoc(doc(db, `users/${user.uid}/notes/${activeNote.id}`), { imageCount: newCount });
    updateNoteFields({ imageCount: newCount });
    setConfirmDel(null);
  };
  const rotateImage = async (imgId, deg) => {
    const img = noteImages.find(im => im.id === imgId);
    if (!img) return;
    try {
      const newDataUrl = await rotateImageData(img.dataUrl, deg);
      await updateDoc(imgDoc(imgId), { dataUrl: newDataUrl, strokes: [] });
    } catch (err) { alert('旋轉失敗：' + err.message); }
  };

  const onPickTaskImage = async (taskId, e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length) return;
    try {
      const task = tasks.find(t => t.id === taskId);
      const newImages = [...(task?.images || [])];
      for (const f of files) {
        const dataUrl = await compressImage(f);
        newImages.push({ id: uid(), dataUrl, strokes: [], grayscale: false });
      }
      await updateDoc(doc(db, `users/${user.uid}/tasks/${taskId}`), { images: newImages });
    } catch (err) { alert('加入照片失敗：' + err.message); }
  };
  const delTaskImage = async (taskId, imgIndex) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    await updateDoc(doc(db, `users/${user.uid}/tasks/${taskId}`), { images: task.images.filter((_, i) => i !== imgIndex) });

  };
  const rotateTaskImage = async (taskId, imgIndex, deg) => {
    try {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      const newDataUrl = await rotateImageData(task.images[imgIndex].dataUrl, deg);
      const newImages = task.images.map((im, i) => i === imgIndex ? { ...im, dataUrl: newDataUrl, strokes: [] } : im);
      await updateDoc(doc(db, `users/${user.uid}/tasks/${taskId}`), { images: newImages });
    } catch (err) { alert('旋轉失敗：' + err.message); }
  };

  // Tasks
  const addTask = async (input) => {
    const title = typeof input === 'string' ? input : input.title;
    const dueDate = typeof input === 'object' ? (input.dueDate || null) : null;
    const reminderOffset = typeof input === 'object' && input.reminderOffset != null ? input.reminderOffset : null;
    try {
      const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("連線逾時")), 5000));
      const addPromise = addDoc(collection(db, `users/${user.uid}/tasks`), {
        projectId: activeProject.id, title, done: false, deleted: false, images: [], pinned: false, sortOrder: Date.now(),
        created: serverTimestamp(), dueDate, reminderOffset, reminded: false,
      });
      await Promise.race([addPromise, timeout]);
      scrollToBottomRef.current = true;
      setNewTaskModal(false);
    } catch (err) {
      if (err.message === "連線逾時") alert("新增失敗：連線逾時！\n\n👉 請檢查 Firebase 連線狀態。");
      else alert("新增任務失敗：" + err.message);
      throw err;
    }
  };
  const updateTaskDueDate = async (id, dueDate, reminderOffset) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), {
      dueDate: dueDate || null,
      reminderOffset: reminderOffset != null ? reminderOffset : null,
      reminded: false,
    });
    setSetDueDateTask(null);
  };
  const completeTask = async (reason) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${completeTaskId}`), {
      done: true, doneReason: reason, doneAt: serverTimestamp()
    });
    scrollToBottomRef.current = true;
    setCompleteTaskId(null);
  };
  const uncompleteTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), {
      done: false, doneReason: null, doneAt: null
    });
  };
  const reorder = async (type, items, fromId, toId) => {
    const fromIdx = items.findIndex(it => it.id === fromId);
    const toIdx   = items.findIndex(it => it.id === toId);
    if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
    const arr = [...items];
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, moved);
    const batch = writeBatch(db);
    const col = type === 'project' ? `users/${user.uid}/projects`
      : type === 'note' ? `users/${user.uid}/notes`
      : type === 'projectFolder' ? `users/${user.uid}/projectFolders`
      : type === 'noteFolder' ? `users/${user.uid}/noteFolders`
      : `users/${user.uid}/tasks`;
    arr.forEach((item, idx) => batch.update(doc(db, `${col}/${item.id}`), { sortOrder: (idx + 1) * 1000 }));
    await batch.commit();
  };
  const toggleProjectPin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/projects/${id}`), { pinned: !pinned });
  };
  const toggleNotePin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/notes/${id}`), { pinned: !pinned });
  };
  const toggleTaskPin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { pinned: !pinned });
  };
  const toggleProjectFolderPin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/projectFolders/${id}`), { pinned: !pinned });
  };
  const toggleNoteFolderPin = async (id, pinned) => {
    await updateDoc(doc(db, `users/${user.uid}/noteFolders/${id}`), { pinned: !pinned });
  };
  const updateTaskTitle = async (id, title) => {
    if (!title.trim()) { setEditingTask(null); return; }
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { title: title.trim() });
    setEditingTask(null);
  };
  const trashTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { deleted: true, deletedAt: serverTimestamp() });
    setConfirmDel(null);
  };
  const restoreTask = async (id) => {
    await updateDoc(doc(db, `users/${user.uid}/tasks/${id}`), { deleted: false, deletedAt: null });
  };
  const permDelTask = async (id) => {
    await deleteDoc(doc(db, `users/${user.uid}/tasks/${id}`));
    setPermDelConfirm(null);
  };

  useEffect(() => {
    if (!user) return;
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
    const check = () => {
      if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
      const now = Date.now();
      tasks.forEach(t => {
        if (t.done || t.deleted || !t.dueDate || t.reminded || t.reminderOffset == null) return;
        const alertAt = new Date(t.dueDate).getTime() - t.reminderOffset * 60000;
        if (now >= alertAt && now < alertAt + 120000) {
          new Notification('任務提醒', { body: t.title, tag: t.id });
          updateDoc(doc(db, `users/${user.uid}/tasks/${t.id}`), { reminded: true }).catch(() => {});
        }
      });
    };
    check();
    const id = setInterval(check, 60000);
    return () => clearInterval(id);
  }, [tasks, user]);

  const BACKUP_LS_KEY = `lastBackupAt_${user?.uid || ''}`;

  const exportBackup = async () => {
    setBackupLoading(true);
    try {
      const [projSnap, noteSnap, taskSnap] = await Promise.all([
        getDocs(collection(db, `users/${user.uid}/projects`)),
        getDocs(collection(db, `users/${user.uid}/notes`)),
        getDocs(collection(db, `users/${user.uid}/tasks`)),
      ]);
      const notesWithImgs = await Promise.all(noteSnap.docs.map(async d => {
        const imgSnap = await getDocs(collection(db, `users/${user.uid}/notes/${d.id}/images`));
        return { id: d.id, ...d.data(), _images: imgSnap.docs.map(im => ({ id: im.id, ...im.data() })) };
      }));
      const data = {
        version: 2,
        exportedAt: new Date().toISOString(),
        uid: user.uid,
        projects: projSnap.docs.map(d => ({ id: d.id, ...d.data() })),
        notes:    notesWithImgs,
        tasks:    taskSnap.docs.map(d => ({ id: d.id, ...d.data() })),
      };
      const json = JSON.stringify(data, (_, v) =>
        v && typeof v.toDate === 'function' ? v.toDate().toISOString() : v, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `照片筆記備份_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      localStorage.setItem(BACKUP_LS_KEY, Date.now().toString());
      alert(`✅ 備份完成！\n\n專案 ${data.projects.length} 個、筆記 ${data.notes.length} 筆、任務 ${data.tasks.length} 個。\n\n請妥善保存備份檔案。`);
    } catch (err) { alert('備份失敗：' + err.message); }
    finally { setBackupLoading(false); }
  };

  const importBackup = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;
    let data;
    try { data = JSON.parse(await file.text()); } catch { alert('檔案格式錯誤，請選擇正確的備份檔案。'); return; }
    if (!data.version || !Array.isArray(data.projects) || !Array.isArray(data.notes)) {
      alert('備份檔案格式不符，無法還原。'); return;
    }
    const ok = window.confirm(
      `準備還原備份：\n• 專案 ${data.projects.length} 個\n• 筆記 ${data.notes.length} 筆\n• 任務 ${(data.tasks||[]).length} 個\n\n` +
      `備份時間：${new Date(data.exportedAt).toLocaleString()}\n\n` +
      `這會在現有資料以外「新增」備份中缺少的項目，不會刪除或覆蓋既有資料。確定繼續？`
    );
    if (!ok) return;
    setBackupLoading(true);
    try {
      const [ep, en, et] = await Promise.all([
        getDocs(collection(db, `users/${user.uid}/projects`)),
        getDocs(collection(db, `users/${user.uid}/notes`)),
        getDocs(collection(db, `users/${user.uid}/tasks`)),
      ]);
      const existP = new Set(ep.docs.map(d => d.id));
      const existN = new Set(en.docs.map(d => d.id));
      const existT = new Set(et.docs.map(d => d.id));
      const newNotes = (data.notes||[]).filter(n => !existN.has(n.id));
      const items = [
        ...(data.projects||[]).filter(p => !existP.has(p.id)).map(p => ({ col: 'projects', ...p })),
        ...newNotes.map(({ _images, ...n }) => ({ col: 'notes', ...n })),
        ...(data.tasks||[]).filter(t => !existT.has(t.id)).map(t => ({ col: 'tasks', ...t })),
      ];
      if (items.length === 0) { alert('備份中的所有資料在目前帳號已存在，無需還原。'); setBackupLoading(false); return; }
      for (let i = 0; i < items.length; i += 400) {
        const batch = writeBatch(db);
        items.slice(i, i + 400).forEach(({ col, id, ...fields }) =>
          batch.set(doc(db, `users/${user.uid}/${col}/${id}`), fields));
        await batch.commit();
      }
      // 還原圖片 subcollection
      for (const n of newNotes) {
        if (!n._images?.length) continue;
        for (let i = 0; i < n._images.length; i += 400) {
          const batch = writeBatch(db);
          n._images.slice(i, i + 400).forEach(({ id: imgId, ...imgFields }) =>
            batch.set(doc(db, `users/${user.uid}/notes/${n.id}/images/${imgId}`), imgFields));
          await batch.commit();
        }
      }
      alert(`✅ 還原完成！共新增 ${items.length} 筆資料。`);
    } catch (err) { alert('還原失敗：' + err.message); }
    finally { setBackupLoading(false); }
  };

  doAutoSaveRef.current = async () => {
    const note = activeNoteRef.current;
    if (!note?.id || !isDirty.current) return;
    isDirty.current = false;
    setSaveStatus('saving');
    try {
      await updateDoc(doc(db, `users/${user.uid}/notes/${note.id}`), {
        title: note.title || '',
        body: note.body || '',
        updated: serverTimestamp()
      });
      setSaveStatus('saved');
    } catch (err) {
      isDirty.current = true;
      setSaveStatus('unsaved');
    }
  };
  saveIfDirtyRef.current = () => {
    if (!isDirty.current) return;
    const note = activeNoteRef.current;
    if (!note?.id) return;
    if (autoSaveTimer.current) { clearTimeout(autoSaveTimer.current); autoSaveTimer.current = null; }
    isDirty.current = false;
    updateDoc(doc(db, `users/${user.uid}/notes/${note.id}`), {
      title: note.title || '',
      body: note.body || '',
      updated: serverTimestamp()
    }).catch(() => {});
  };

  if (!authReady) return h('div', { style: { ...S.app, alignItems: 'center', justifyContent: 'center' } }, '載入中…');
  if (!user) return h(Login);

  const offlineBanner = isOffline && h('div', {
    style: { position: 'fixed', top: 0, left: 0, right: 0, background: '#fef3c7', color: '#92400e', padding: '6px 14px', fontSize: 12.5, textAlign: 'center', zIndex: 300, borderBottom: '1px solid #fde68a' }
  }, '📵 離線模式 — 顯示快取資料，新增與修改將在恢復連線後同步');

  // 排序優先順序：釘選 > 拖曳自訂順序(sortOrder) > 預設排序
  const byOrder = (a, b) => {
    const pin = (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    if (pin !== 0) return pin;
    if (a.sortOrder != null && b.sortOrder != null) return a.sortOrder - b.sortOrder;
    if (a.sortOrder != null) return -1;
    if (b.sortOrder != null) return 1;
    return 0;
  };
  const overdueProjectIds = new Set(
    allTasksMeta
      .filter(t => !t.done && !t.deleted && t.dueDate && new Date(t.dueDate) <= new Date())
      .map(t => t.projectId)
  );

  const activeProjects = projects.filter(p => !p.deleted).sort((a, b) =>
    byOrder(a, b) || getSafeTime(b.created) - getSafeTime(a.created));
  const sortedProjectFolders = [...projectFolders].sort((a, b) =>
    byOrder(a, b) || getSafeTime(a.created) - getSafeTime(b.created));
  const sortedNoteFolders = [...noteFolders].sort((a, b) =>
    byOrder(a, b) || getSafeTime(a.created) - getSafeTime(b.created));
  const deletedProjects = projects.filter(p => p.deleted);
  const visibleNotes = notes.filter(n => !n.deleted);
  const visibleTasks = tasks.filter(t => !t.deleted);

  const sortedNotes = [...visibleNotes].sort((a, b) => {
    const ord = byOrder(a, b); if (ord !== 0) return ord;
    if (noteSort === 'name') return (a.title || '').localeCompare(b.title || '');
    if (noteSort === 'created') return getSafeTime(b.created) - getSafeTime(a.created);
    return getSafeTime(b.updated) - getSafeTime(a.updated);
  });
  const sortedTasks = [...visibleTasks].sort((a, b) => {
    // 已完成永遠排最底
    const doneOrd = (a.done ? 1 : 0) - (b.done ? 1 : 0);
    if (doneOrd !== 0) return doneOrd;
    const ord = byOrder(a, b); if (ord !== 0) return ord;
    if (taskSort === 'name') return (a.title || '').localeCompare(b.title || '');
    if (taskSort === 'due') {
      const aDue = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
      const bDue = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;
      return aDue - bDue;
    }
    return getSafeTime(b.created) - getSafeTime(a.created);
  });
  const filtered = sortedNotes.filter((n) => !search || (n.title || '').includes(search) || stripHtml(n.body || '').includes(search));

  const globalResults = (globalSearchOpen && globalSearchQuery.trim().length >= 1) ? (() => {
    const q = globalSearchQuery;
    const matchedNotes = allNotesForSearch
      .filter(n => (n.title || '').includes(q) || stripHtml(n.body || '').includes(q))
      .map(n => ({ ...n, _type: 'note' }));
    const matchedTasks = allTasksForSearch
      .filter(t => (t.title || '').includes(q))
      .map(t => ({ ...t, _type: 'task' }));
    return [...matchedNotes, ...matchedTasks]
      .sort((a, b) => getSafeTime(b.updated || b.created) - getSafeTime(a.updated || a.created))
      .slice(0, 60);
  })() : [];

  const globalSearchModal = globalSearchOpen && h('div', {
    className: 'no-print',
    style: { position: 'fixed', inset: 0, background: 'rgba(15,23,42,.72)', zIndex: 500, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '10vh 20px 20px' },
    onClick: (e) => e.target === e.currentTarget && setGlobalSearchOpen(false)
  },
    h('div', { style: { background: '#fff', borderRadius: 14, width: '100%', maxWidth: 560, maxHeight: '70vh', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(0,0,0,.25)' } },
      h('div', { style: { padding: '14px 16px', borderBottom: '1px solid #f1f5f9' } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, background: '#f8fafc', border: '1px solid #e5e7eb', borderRadius: 10, padding: '8px 12px' } },
          h('span', { style: { color: '#94a3b8', fontSize: 15 } }, '🔍'),
          h('input', {
            autoFocus: true,
            value: globalSearchQuery,
            onChange: (e) => setGlobalSearchQuery(e.target.value),
            onKeyDown: (e) => { if (e.key === 'Escape') setGlobalSearchOpen(false); },
            placeholder: '搜尋所有專案的筆記、任務…',
            style: { flex: 1, border: 'none', background: 'transparent', outline: 'none', fontSize: 15, color: '#1f2937', boxShadow: 'none' }
          }),
          globalSearchQuery && h('button', { onClick: () => setGlobalSearchQuery(''), style: { background: 'none', border: 'none', cursor: 'pointer', color: '#9ca3af', fontSize: 15, padding: 0, lineHeight: 1 } }, '✕')
        )
      ),
      h('div', { style: { overflowY: 'auto', flex: 1 } },
        globalSearchQuery.trim().length < 1
          ? h('div', { style: { padding: '32px 20px', textAlign: 'center', color: '#94a3b8', fontSize: 13 } }, '輸入關鍵字，搜尋所有專案的筆記與任務')
          : (allNotesForSearch.length === 0 && allTasksForSearch.length === 0)
          ? h('div', { style: { padding: '32px 20px', textAlign: 'center', color: '#94a3b8', fontSize: 13 } }, '載入中…')
          : globalResults.length === 0
          ? h('div', { style: { padding: '32px 20px', textAlign: 'center', color: '#94a3b8', fontSize: 13 } }, `找不到符合「${globalSearchQuery}」的筆記或任務`)
          : globalResults.map(item => {
              const proj = projects.find(p => p.id === item.projectId);
              const isTask = item._type === 'task';
              const bodyText = isTask ? '' : stripHtml(item.body || '');
              const qi = bodyText.indexOf(globalSearchQuery);
              const snippet = qi >= 0 ? bodyText.slice(Math.max(0, qi - 20), qi + 60) : bodyText.slice(0, 80);
              return h('div', {
                key: item._type + item.id,
                onClick: () => {
                  saveIfDirtyRef.current?.();
                  setSaveStatus('idle');
                  if (proj) { setActiveProject(proj); setTab(isTask ? 'tasks' : 'notes'); }
                  if (!isTask) { setActiveNote(item); setMobileView('editor'); clearSelImg(); }
                  else setMobileView('list');
                  setSearch('');
                  setGlobalSearchOpen(false);
                },
                style: { padding: '13px 18px', borderBottom: '1px solid #f8fafc', cursor: 'pointer' }
              },
                h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 } },

                  h('span', { style: { fontWeight: 600, fontSize: 14, color: isTask && item.done ? '#94a3b8' : '#1f2937', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textDecoration: isTask && item.done ? 'line-through' : 'none' } },
                    item.title || '未命名筆記'),
                  h('span', { style: { fontSize: 11, color: isTask ? '#7c3aed' : '#0d9488', background: isTask ? '#f5f3ff' : '#f0fdfa', padding: '2px 7px', borderRadius: 10, flexShrink: 0 } },
                    isTask ? '任務' : '筆記'),

                ),
                !isTask && snippet && h('div', { style: { fontSize: 12.5, color: '#6b7280', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, snippet),
                h('div', { style: { fontSize: 11, color: '#cbd5e1', marginTop: 4 } },
                  isTask ? (item.dueDate ? `截止 ${fmtDue(item.dueDate)?.text || item.dueDate}` : `建立 ${fmt(item.created)}`) : fmt(item.updated))
              );
            })
      )
    )
  );

  let noteSize = 0, sizePct = 0;
  if (activeNote) {
    noteSize = estimateNoteSize(activeNote);
    sizePct = Math.min(100, Math.round(noteSize / 10000));
  }

  // 手機向右滑 → 上一頁，向左滑 → 下一頁
  const swipeHandlers = (view) => ({
    onTouchStart: (e) => {
      const t = e.touches[0];
      swipeStart.current = { x: t.clientX, y: t.clientY };
    },
    onTouchEnd: (e) => {
      if (!swipeStart.current) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - swipeStart.current.x;
      const dy = t.clientY - swipeStart.current.y;
      swipeStart.current = null;
      if (Math.abs(dy) > Math.abs(dx) || Math.abs(dx) < 60) return;
      if (dx > 0) {
        // 向右滑 → 上一頁
        if (view === 'editor') { saveIfDirtyRef.current?.(); setMobileView('list'); }
        else if (view === 'list' || view === 'trash') setMobileView('sidebar');
      } else {
        // 向左滑 → 下一頁
        if (view === 'sidebar' && activeProject) setMobileView('list');
        else if (view === 'list' && activeNote && tab === 'notes') setMobileView('editor');
      }
    },
  });

  // Sidebar 拖曳調整寬度
  const startSidebarResize = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = sidebarWidth;
    const onMove = (e) => setSidebarWidth(Math.max(150, Math.min(420, startW + e.clientX - startX)));
    const onUp = (e) => {
      const w = Math.max(150, Math.min(420, startW + e.clientX - startX));
      localStorage.setItem('sidebarW', w);
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
  const resizeHandle = h('div', { className: 'resize-handle hide-on-mobile', onMouseDown: startSidebarResize });

  // 渲染專案列表 (Sidebar)
  const sidebar = h('aside', { className: mobileView === 'sidebar' ? 'mobile-full-width' : 'hide-on-mobile', style: { ...S.sidebar, width: sidebarWidth }, ...swipeHandlers('sidebar') },
    h('div', { style: { ...S.brand, flexDirection: 'column', alignItems: 'flex-start', gap: 0 } },
      h('div', { style: { display: 'flex', alignItems: 'center', width: '100%', marginBottom: 2 } },
        h('span', null, '📷 照片筆記'),
        h('button', {
          onClick: () => { setGlobalSearchOpen(true); setGlobalSearchQuery(''); },
          title: '全站搜尋 (Ctrl+K)',

        }, '🔍 搜尋')
      ),
      h('div', { style: { fontSize: 10.5, color: '#94a3b8', fontWeight: 400, marginBottom: 8, display: 'flex', flexDirection: 'column', gap: 1 } },

      ? h(NewFolderInput, {
          onConfirm: async (name) => {

    h('div', { style: { overflowY: "auto", flex: 1, marginTop: 4 } },

        ...sortedProjectFolders.map((folder, fi) => {

              style: { display: 'flex', alignItems: 'center', padding: '5px 10px 3px', fontSize: 12, fontWeight: 600, color: '#64748b', userSelect: 'none', gap: 2 }

                  onDragLeave: (e) => { e.currentTarget.style.background = ''; },

        setShowTrash(t => {

    (() => {
      const lastBackup = parseInt(localStorage.getItem(BACKUP_LS_KEY) || '0');
      const daysSince = lastBackup ? Math.floor((Date.now() - lastBackup) / 86400000) : null;
      const overdue = daysSince === null || daysSince >= 7;
      return h('div', { style: { borderTop: '1px solid #f1f5f9', paddingTop: 8, marginTop: 4 } },

        ),
        !overdue && h('div', { style: { fontSize: 11, color: '#64748b', marginBottom: 4 } },
          `上次備份：${daysSince === 0 ? '今天' : `${daysSince} 天前`}`
        ),
        h('div', { style: { display: 'flex', gap: 4 } },
          h('button', {
            onClick: exportBackup, disabled: backupLoading,
            style: { flex: 1, fontSize: 11.5, padding: '6px 4px', background: '#f0fdfa', color: '#0d9488', border: '1px solid #99f6e4', borderRadius: 6, cursor: backupLoading ? 'default' : 'pointer', opacity: backupLoading ? 0.6 : 1 }
          }, backupLoading ? '處理中…' : '📤 備份資料'),
          h('label', {
            style: { flex: 1, fontSize: 11.5, padding: '6px 4px', background: '#f8fafc', color: '#64748b', border: '1px solid #e5e7eb', borderRadius: 6, cursor: backupLoading ? 'default' : 'pointer', textAlign: 'center', opacity: backupLoading ? 0.6 : 1, pointerEvents: backupLoading ? 'none' : 'auto' }
          },
            '📥 還原備份',
            h('input', { type: 'file', accept: '.json,application/json', onChange: importBackup, style: { display: 'none' } })
          )
        )
      );
    })(),
    h('div', { style: S.userBar },
      h('div', { style: S.userInfo },
        user.photoURL && h('img', { src: user.photoURL, alt: '', style: S.avatar, referrerPolicy: 'no-referrer' }),
        h('span', { style: S.userName }, user.displayName || user.email)),
      h('button', { onClick: () => signOut(auth), style: { ...S.miniBtn, background: '#f1f5f9', color: '#64748b', width: 30, height: 30 }, title: '登出' }, '⎋'))
  );

  // 垃圾桶視圖
  if (showTrash) {
    const trashEmpty = deletedProjects.length === 0 && allDeletedNotes.length === 0 && allDeletedTasks.length === 0;
    return h('div', { style: S.app },
      offlineBanner,
      sidebar,
      resizeHandle,
      globalSearchModal,
      h('main', { className: mobileView === 'list' ? 'mobile-full-width' : 'hide-on-mobile', style: { ...S.editorCol, padding: 24, overflowY: 'auto' }, ...swipeHandlers('trash') },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 } },
          h('button', { className: 'mobile-only', onClick: () => setMobileView('sidebar'), style: { background: 'none', border: 'none', fontSize: 24, padding: '0 8px', cursor: 'pointer', color: '#64748b' } }, '‹'),
          h('h2', { style: { margin: 0 } }, '🗑️ 垃圾桶')
        ),
        h('p', { style: { color: '#64748b', fontSize: 13 } }, '在這裡可以還原刪除的項目，或永久刪除釋放空間。'),
        trashEmpty && h('div', { style: { ...S.placeholder, height: 200 } }, '垃圾桶是空的'),
        deletedProjects.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除專案 (${deletedProjects.length})`),
          ...deletedProjects.map(p => h('div', { key: p.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `📁 ${p.name}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(p.deletedAt)}　會連同其中所有筆記與任務一併處理`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreProject(p.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'project' && permDelConfirm.id === p.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelProject(p.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))
                : h('button', { onClick: () => setPermDelConfirm({ type: 'project', id: p.id }), style: S.miniDanger }, '永久刪除'))
          ))
        ),
        allDeletedNotes.length > 0 && h('div', null,
          h('h3', { style: { marginTop: 24, fontSize: 14, color: '#64748b' } }, `已刪除筆記 (${allDeletedNotes.length})`),
          ...allDeletedNotes.map(n => h('div', { key: n.id, style: S.trashItem },
            h('div', { style: S.trashItemName }, `📝 ${n.title || '未命名筆記'}`),
            h('div', { style: S.trashItemMeta }, `刪除於 ${fmt(n.deletedAt)}　${(n.imageCount || n.images?.length || 0)} 張照片`),
            h('div', { style: S.trashItemActions },
              h('button', { onClick: () => restoreNote(n.id), style: S.miniLink }, '↻ 還原'),
              permDelConfirm?.type === 'note' && permDelConfirm.id === n.id
                ? h('span', { style: { display: 'flex', gap: 6 } },
                    h('button', { onClick: () => permDelNote(n.id), style: { ...S.miniDanger, background: '#ef4444', color: '#fff' } }, '確定永久刪除'),
                    h('button', { onClick: () => setPermDelConfirm(null), style: S.miniLink }, '取消'))

                  h('button', { onMouseDown: (e) => { e.preventDefault(); document.execCommand('outdent'); bodyRef.current?.focus(); },
                    style: S.fmtBtn, title: '取消縮排' }, '⇤'),
                  h('div', { style: S.fmtDivider }),
                  h('button', { onMouseDown: (e) => { e.preventDefault(); document.execCommand('insertUnorderedList'); bodyRef.current?.focus(); },
                    style: S.fmtBtn, title: '項目符號清單' }, '• 清單'),
                  h('button', { onMouseDown: (e) => { e.preventDefault(); document.execCommand('insertOrderedList'); bodyRef.current?.focus(); },
                    style: S.fmtBtn, title: '編號清單' }, '1. 清單'),
                  h('div', { style: S.fmtDivider }),
                  h('button', { onMouseDown: (e) => {
                    e.preventDefault();
                    document.execCommand('removeFormat');
                    // removeFormat 只能清除行內格式；額外掃描並清除 selection 範圍內
                    // 所有帶 background-color 的元素（包含 block 層級的 div/p）
                    const sel = window.getSelection();
                    if (sel && sel.rangeCount > 0 && bodyRef.current) {
                      const range = sel.getRangeAt(0);
                      bodyRef.current.querySelectorAll('[style]').forEach(el => {
                        if (el !== bodyRef.current && el.style.backgroundColor && range.intersectsNode(el)) {
                          el.style.removeProperty('background-color');
                          if (!el.style.cssText.trim()) el.removeAttribute('style');
                        }
                      });
                      // 也清除包住 selection 的祖先元素上的 background-color
                      let node = range.startContainer.nodeType === Node.TEXT_NODE
                        ? range.startContainer.parentElement : range.startContainer;
                      while (node && node !== bodyRef.current) {
                        if (node.style && node.style.backgroundColor) {
                          node.style.removeProperty('background-color');
                          if (!node.style.cssText.trim()) node.removeAttribute('style');
                        }
                        node = node.parentElement;
                      }
                      updateNoteFields({ body: bodyRef.current.innerHTML || '' });
                    }
                    bodyRef.current?.focus();
                  },
                    style: { ...S.fmtBtn, fontSize: 11, color: '#94a3b8' }, title: '清除所有格式' }, '✕格式'),
                  h('div', { style: S.fmtDivider }),
                  h('button', { onMouseDown: (e) => { e.preventDefault(); applyListItem('li1', '1.'); },
                    style: S.fmtBtn, title: '大項 1. 2. 3.　Enter自動接續，Tab換層' }, '1.大'),
                  h('button', { onMouseDown: (e) => { e.preventDefault(); applyListItem('li2', 'a.'); },
                    style: S.fmtBtn, title: '小項 a. b. c.' }, 'a.小'),
                  h('button', { onMouseDown: (e) => { e.preventDefault(); applyListItem('li3', '。'); },
                    style: S.fmtBtn, title: '細項 。' }, '。細')
                ),
                h('div', { style: { display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 } },
                  h('button', { onClick: undoBodyEdit, disabled: !canBodyUndo, title: '上一步 (Ctrl+Z)',
                    style: { ...S.fmtBtn, minWidth: 'auto', padding: '0 8px', opacity: canBodyUndo ? 1 : 0.35, cursor: canBodyUndo ? 'pointer' : 'default' } }, '↩ 上一步'),
                  h('button', { onClick: () => setBodyExpanded(b => !b), title: bodyExpanded ? '縮小' : '放大文字欄',
                    style: { ...S.fmtBtn, color: '#94a3b8', fontSize: 16 } }, bodyExpanded ? '⊡' : '⊞')
                )
              ),
              h('div', {
                ref: bodyRef,
                contentEditable: true,
                suppressContentEditableWarning: true,
                'data-placeholder': '在這裡寫工作記事…　拍照或匯入照片後，點照片即可在上面畫圖、標註。',
                className: 'note-body',
                onClick: (e) => {
                  const img = e.target.tagName === 'IMG' && e.target.dataset.inline ? e.target : null;
                  if (img) selectInlineImg(img);
                  else clearSelImg();
                },
                onInput: () => {
                  const html = bodyRef.current?.innerHTML || '';
                  if (html === '<br>') bodyRef.current.innerHTML = '';
                  const now = Date.now();
                  if (now - bodyUndoLastPush.current > 800) {
                    bodyUndoStack.current = [...bodyUndoStack.current, activeNote.body || ''].slice(-50);
                    bodyUndoLastPush.current = now;
                    setCanBodyUndo(true);
                  }
                  updateNoteFields({ body: bodyRef.current?.innerHTML || '' });
                },
                onPaste: (e) => {
                  const items = Array.from(e.clipboardData?.items || []);
                  const imgItem = items.find(it => it.type.startsWith('image/'));
                  if (imgItem) {
                    e.preventDefault();
                    const file = imgItem.getAsFile();
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                      const tmp = document.createElement('img');
                      tmp.onload = () => {
                        const MAX = 900;
                        const scale = Math.min(1, MAX / Math.max(tmp.width, tmp.height));
                        const w = Math.round(tmp.width * scale), h = Math.round(tmp.height * scale);
                        const c = document.createElement('canvas');
                        c.width = w; c.height = h;
                        c.getContext('2d').drawImage(tmp, 0, 0, w, h);
                        let q = 0.85, dataUrl;
                        do { dataUrl = c.toDataURL('image/jpeg', q); q = Math.round((q - 0.1) * 10) / 10; }
                        while (dataUrl.length > 350000 && q >= 0.3);
                        const id = uid();
                        document.execCommand('insertHTML', false, `<img data-inline="${id}" src="${dataUrl}" />`);
                        updateNoteFields({ body: bodyRef.current?.innerHTML || '' });
                      };
                      tmp.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                    return;
                  }
                  const ph = e.clipboardData?.getData('text/html') || '';
                  if (/<img\b/i.test(ph)) {
                    e.preventDefault();
                    const pt = e.clipboardData?.getData('text/plain') || '';
                    if (pt) document.execCommand('insertText', false, pt);
                  }
                },
                onKeyDown: (e) => {
                  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undoBodyEdit(); return; }
                  if (e.key !== 'Tab' && e.key !== 'Enter') return;
                  const sel = window.getSelection();
                  let listNode = null;
                  if (sel.rangeCount && bodyRef.current) {
                    let n = sel.getRangeAt(0).startContainer;
                    while (n && n.parentNode !== bodyRef.current) n = n.parentNode;
                    if (n && n.nodeType === 1 && ['li1','li2','li3'].some(c => n.className?.split(' ').includes(c))) listNode = n;
                  }
                  if (e.key === 'Tab') {
                    e.preventDefault();
                    if (listNode) {
                      const levels = ['li1','li2','li3'];
                      const idx = levels.findIndex(c => listNode.className?.split(' ').includes(c));
                      if (!e.shiftKey && idx < 2) listNode.className = levels[idx + 1];
                      else if (e.shiftKey && idx > 0) listNode.className = levels[idx - 1];
                      const r = document.createRange(); r.selectNodeContents(listNode); r.collapse(false);
                      sel.removeAllRanges(); sel.addRange(r);
                      updateNoteFields({ body: bodyRef.current.innerHTML });
                    } else if (!e.shiftKey) { document.execCommand('insertHTML', false, '    '); }
                    return;
                  }
                  if (e.key === 'Enter' && !e.shiftKey && listNode) {
                    e.preventDefault();
                    const cls = ['li1','li2','li3'].find(c => listNode.className?.split(' ').includes(c));
                    const text = listNode.textContent.trim();
                    if ({ li1: /^\d+\.\s*$/, li2: /^[a-z]\.\s*$/, li3: /^[。]\s*$/ }[cls].test(text)) {
                      listNode.className = ''; listNode.innerHTML = '<br>';
                      const r = document.createRange(); r.setStart(listNode, 0); r.collapse(true);
                      sel.removeAllRanges(); sel.addRange(r);
                    } else {
                      let px;
                      if (cls === 'li1') { const m = text.match(/^(\d+)\./); px = m ? (parseInt(m[1])+1)+'.' : '1.'; }
                      else if (cls === 'li2') { const m = text.match(/^([a-z])\./); px = (m && m[1] < 'z') ? String.fromCharCode(m[1].charCodeAt(0)+1)+'.' : 'a.'; }
                      else px = '。';
                      const el = document.createElement('div'); el.className = cls; el.textContent = px + ' ';
                      listNode.after(el);
                      const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
                      sel.removeAllRanges(); sel.addRange(r);
                    }
                    updateNoteFields({ body: bodyRef.current.innerHTML }); return;
                  }
                },
                style: { ...S.bodyArea, borderRadius: '0 0 10px 10px', borderTop: 'none',
                  minHeight: bodyExpanded ? 'calc(100vh - 340px)' : 150, overflow: 'auto', resize: 'none' }
              })
            ),
            (noteImages.length > 0) && h('div', { style: S.imgGrid },
              ...noteImages.map((im, i) =>
                h(ImageCard, { key: im.id, image: im, index: i,
                  onView: () => setLightbox(im),
                  onAnnotate: () => setAnnotating({ type: 'note', imgIndex: i }),
                  onDelete: () => setConfirmDel({ type: "image", id: im.id }),
                  confirmingDelete: confirmDel?.type === "image" && confirmDel.id === im.id,
                  onConfirmDelete: () => delImage(im.id),
                  onRotateLeft: () => rotateImage(im.id, 270),
                  onRotateRight: () => rotateImage(im.id, 90),
                })))
          )
    ),

    selImg && (() => {
      const r = selImg.rect;
      const btnStyle = { color: '#fff', background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, padding: '2px 7px', borderRadius: 4 };
      const setW = (w) => {
        const img = bodyRef.current?.querySelector(`img[data-inline="${selImg.imgId}"]`);
        if (img) { img.style.width = w; updateNoteFields({ body: bodyRef.current.innerHTML }); setSelImg(s => s ? { ...s, rect: img.getBoundingClientRect() } : s); }
      };
      const toggleRow = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const img = bodyRef.current?.querySelector(`img[data-inline="${selImg.imgId}"]`);
        if (!img) return;
        const currently = img.classList.contains('img-row');
        if (currently) {
          img.classList.remove('img-row');
          img.style.float = '';
          img.style.width = '';
          img.style.margin = '';
        } else {
          img.classList.add('img-row');
          img.style.width = img.style.width || '48%';
        }
        updateNoteFields({ body: bodyRef.current.innerHTML });
        setSelImg(s => s ? { ...s, rect: img.getBoundingClientRect() } : s);
      };
      const isRow = !!bodyRef.current?.querySelector(`img[data-inline="${selImg.imgId}"]`)?.classList.contains('img-row');
      return h(React.Fragment, null,
        h('div', { className: 'no-print', onMouseDown: e => e.preventDefault(),
          style: { position: 'fixed', top: Math.max(4, r.top - 40), left: r.left, zIndex: 400,
            background: '#1f2937', borderRadius: 6, padding: '2px 4px', display: 'flex', alignItems: 'center', gap: 1,
            boxShadow: '0 2px 8px rgba(0,0,0,0.4)', whiteSpace: 'nowrap' } },
          h('span', { style: { color: '#9ca3af', fontSize: 11, padding: '0 4px' } }, '大小:'),
          h('button', { style: btnStyle, onClick: () => setW('25%') }, '小'),
          h('button', { style: btnStyle, onClick: () => setW('50%') }, '中'),
          h('button', { style: btnStyle, onClick: () => setW('100%') }, '大'),
          h('div', { style: { width: 1, background: '#4b5563', margin: '4px 2px', alignSelf: 'stretch' } }),
          h('button', {
            style: { ...btnStyle, color: isRow ? '#fbbf24' : '#94a3b8', background: isRow ? 'rgba(251,191,36,.2)' : 'none', borderRadius: 4 },
            onMouseDown: toggleRow, title: isRow ? '切換為獨排' : '切換為並排（多張圖片靠在一起）'
          }, isRow ? '↕ 獨排' : '↔ 並排'),
          h('div', { style: { width: 1, background: '#4b5563', margin: '4px 2px', alignSelf: 'stretch' } }),
          h('button', { style: { ...btnStyle, color: '#5eead4' },
            onClick: () => {
              const img = bodyRef.current?.querySelector(`img[data-inline="${selImg.imgId}"]`);
              let strokes = [];
              try { strokes = JSON.parse(img?.dataset.strokes || '[]'); } catch {}
              setAnnotating({ type: 'inline', imgId: selImg.imgId, src: img?.dataset.original || selImg.src, strokes });
              clearSelImg();
            } }, '✏️ 標注'),
          h('button', { style: { ...btnStyle, color: '#fca5a5' },
            onClick: () => { deleteInlineImg(selImg.imgId); clearSelImg(); } }, '🗑'),
        ),
        h('div', { className: 'no-print', onMouseDown: startImgResize,
          style: { position: 'fixed', left: r.right - 8, top: r.bottom - 8, width: 14, height: 14,
            background: '#0d9488', border: '2px solid #fff', borderRadius: 2, cursor: 'se-resize', zIndex: 401 } })
      );
    })(),
    annotating && (() => {
      if (annotating.type === 'inline') return h(PhotoAnnotator, {
        src: annotating.src, initialStrokes: annotating.strokes || [], initialGrayscale: false,
        onSave: saveAnnotation, onClose: () => setAnnotating(null)
      });
      const im = annotating.type === 'task'
        ? tasks.find(t => t.id === annotating.id)?.images[annotating.imgIndex]
        : activeNote?.images[annotating.imgIndex];
      return im ? h(PhotoAnnotator, {
        src: im.dataUrl, initialStrokes: im.strokes || [], initialGrayscale: !!im.grayscale,
        onSave: saveAnnotation, onClose: () => setAnnotating(null)
      }) : null;
    })(),
    lightbox && h(Lightbox, { image: lightbox, onClose: () => setLightbox(null) }),
    newTaskModal && h(NewTaskModal, { onConfirm: addTask, onCancel: () => setNewTaskModal(false) }),
    setDueDateTask && h(DueDateModal, {
      task: setDueDateTask,
      onSave: (dueDate, reminderOffset) => updateTaskDueDate(setDueDateTask.id, dueDate, reminderOffset),
      onCancel: () => setSetDueDateTask(null)
    }),
    completeTaskId && h(TextModal, {
      title: '完成任務', subtitle: '記錄一下完成的方式或結果，之後可以回顧。',
      placeholder: '例如：已親送至客戶辦公室、編號 A-23',
      multiline: true, confirmText: '完成',
      onConfirm: completeTask, onCancel: () => setCompleteTaskId(null)
    }),
    folderMenu && h('div', { style: S.modalOverlay, onClick: () => setFolderMenu(null) },
      h('div', { style: { ...S.modalCard, maxWidth: 260 }, onClick: e => e.stopPropagation() },
        h('h3', { style: { margin: '0 0 12px', fontSize: 15, color: '#1f2937' } }, '移到資料夾'),
        h('div', { onClick: () => folderMenu.type === 'project' ? setProjectFolder(folderMenu.id, null) : setNoteFolder(folderMenu.id, null),
          style: { padding: '10px 14px', cursor: 'pointer', borderRadius: 8, border: '1px solid #e5e7eb', marginBottom: 6, fontSize: 14 } }, '🗂 未分類'),
        ...(folderMenu.type === 'project' ? projectFolders : noteFolders).map(f =>
          h('div', { key: f.id, onClick: () => folderMenu.type === 'project' ? setProjectFolder(folderMenu.id, f.id) : setNoteFolder(folderMenu.id, f.id),
            style: { padding: '10px 14px', cursor: 'pointer', borderRadius: 8, border: '1px solid #e5e7eb', marginBottom: 6, fontSize: 14 } }, `📁 ${f.name}`)
        ),
        h('button', { onClick: () => setFolderMenu(null), style: { ...S.ghostBtn, width: '100%', marginTop: 4 } }, '取消')
      )
    ),
    globalSearchModal
  );
}

createRoot(document.getElementById('root')).render(h(App));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
